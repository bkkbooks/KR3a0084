body:
  text: 困知記續録巻上明羅欽順撰凡八十章異端之說自古有之考其為害莫有過於佛氏者矣佛法初入中國惟以生死輪廻之說動人人之情莫不貪生而惡死茍可以免輪廻出生死安得不惟其言之聽旣有求於彼則彼之遺君親㓕種類凡得罪於名教者勢不得不姑置之然吾儒之信之者猶鮮也其後有逹磨者至直指人心見性成佛以為一聞千悟神通自在不可思議則其說之𤣥妙迥非前日比矣於是髙明者亦徃徃惑焉惑及於髙明則其害有不可勝救者矣何哉盖髙明之士其精神意氣足以建立門户其聰明才辨足以張大說辭旣以其道為至則取自古帝王精一執中之傳孔門一貫忠恕之㫖克己為仁之訓大學致知格物之教中庸性道中和之義孟子知言養氣盡心知性之說一切皆以其說亂之真妄混淆學者茫然莫知所適一入其䧟穽鮮復能有以自㧞者故内之無以立大中至正之本外之無以逹經世宰物之用教衰而俗敗不但可為長太息而已向非兩程子張子朱子身任斯道恊心并力以排斥之吾人之不變於夷者能㡬何哉惟數君子道徳之充備學術之純深辨論之明確自孟子而後莫或過之故其言一出聰明豪傑之士靡不心服近者親而炙之逺者聞風而起相與為之羽翼以推行其說於天下者繩繩不乏迨我聖祖出位隆君師興學育才一以五經四書及數君子之說為教則主張斯道者又誠有所賴矣故自朱子没迄今三四百年天下之士非聖賢之學不講而所謂禪學者以之㓕息是豈一人一日之力哉夫何近世以來乃復潛有衣鉢之傳而外假於道學以文其說初學之士旣莫能明乎心性之辨世之老師宿儒又徃徃不屑究心於所謂禪者故其說之興能救正者殊鮮而從之者實繁有徒其志將以求道也曾不知其所求之非道也豈不誤哉愚也才質凡下於數君子無能為役但以初未學禪而偶嘗有悟從事於吾儒之學也久而性命之理亦粗若有見焉故於異同之際頗能辨别雖嘗著之於䇿𫝊之吾黨庶㡬愛助之萬一時復披閱則猶病其說之未詳懼無以觧夫人之惑也記於是乎有續云佛氏之所謂性覺而已矣其所謂覺不出乎見聞知覺而已矣然又有謂法離見聞覺知者豈見聞知覺之外别有所謂覺邪良由迷悟之不同爾後來其徒之桀􅃛者因而造妖捏怪百般作弄神出鬼没以逞其伎倆而聳動人之聽聞祗為衆人皆在迷中不妨東說西說謂莫能與之明辨也今湏據他策子上言語反覆異同處一一窮究以見其所謂性者果不出於見聞知覺别無妙理然後吾儒之性理可得而明有如士師之折獄兩造具偹精加研覈必無以隱其情矣其情既得則是非之判有如黒白至此而猶以非為是不㡬於無是非之心者乎逹磨者禪家之初祖也其𫝊法二祖時嘗謂之曰吾觀震旦所有經教惟楞伽四卷可以印心遂併授之自後其徒皆尊信此經以為祕典則今所宜按據以窮究其所謂性者無出此經此經凡四譯四卷者乃劉宋時譯本其文頗奥澁難讀當出自佛口無疑迨國初髙僧宗泐如玘嘗奉詔註釋叅以唐本亦頗明白但經中言語初無次第散漫不一觀者猝難理㑹今輙聮比而貫通之以究極其歸趣遇奥澁處間亦附入註語以暢其義髙明之士有深於其說者當知余言之不妄也楞伽大㫖有四曰五法曰三自性曰八識曰二無我一切佛法悉入其中經中明言之矣五法者名也相也妄想也正智也如如也三自性者妄想自性縁起自性成自性也八識者識蔵也意根意識眼識耳識鼻識舌識身識也二無我者人無我法無我也凡此諸法不出迷悟兩途盖迷則為名為相為妄想為妄想縁起自性為人法二執而識蔵轉為諸識悟則為正智為如如為成自性為人法無我而諸識轉為真識所謂人法則五隂十二入十八界是已五隂者色受想行識也十二入者眼耳鼻舌身意六根對色聲香味觸法六塵也加之六識是為十八界合而言之人也析而言之法也有所覺之謂悟無所覺之謂迷佛者覺也而覺有二義有始覺有本覺始覺者目前悟入之覺即所謂正智也即人而言之也本覺者常住不動之覺即所謂如如也離人而言之也因始覺而合本覺所以成佛之道也及其至也始覺正智亦泯而本覺朗然獨存則佛果成矣故佛有十號其一曰等正覺此之謂也本覺乃見聞知覺之體五隂之識屬焉見聞知覺乃本覺之用十八界之識屬焉非本覺即無以為見聞知覺舎見聞知覺則亦無本覺矣故曰如來於隂界入非異非不異其謂法離見聞覺知者何懼其着也佛以離情遣著然後可以入道故欲人於見聞知覺一切離之離之云者非不見不聞無知無覺也不著於見聞知覺而已矣金剛經所謂心不住法而行布施應無所住而生清浄心即其義也然則佛氏之所謂性不亦明甚矣乎彼明以知覺為性始終不知性之為理乃欲强合於吾儒以為一道如之何其可合也昔逹磨弟子波羅提嘗言作用是性有偈云在胎為身處世為人在眼曰見在耳曰聞在鼻辨香在口談論在手執捉在足運奔徧現俱該沙界收攝在一㣲塵識者知是佛性不識喚作精魂識與不識即迷悟之謂也知是佛性即所謂正智如如喚作精魂即所謂名相妄想此偈自是真實語後來桀黠者出嫌其淺近乃人人􅑃出一般鬼怪說話直是𤣥妙直是竒特以利心求者安得不為其所動乎張子所謂詖􅁋邪遁之辭翕然並興一出於佛氏之門誠知言矣然造妖􅑃怪不止其徒但嘗畧中其毒者徃徃便能如此吾黨尤不可不知楞伽四卷卷首皆云一切佛語心品良以萬法唯識諸識唯心種種差别不出心識而已故經中之言識也特詳第一卷首言諸識有二種生住㓕謂流注生住㓕相生住㓕次言諸識有三種相謂轉相業相真相又云畧說有三種識廣說有八相何等為三謂真識現識及分别事識又云若覆彼真識種種不實諸虚妄㓕則一切根識㓕是名相㓕又云轉識蔵識真相若異者蔵識非因若不異者轉識㓕蔵識亦應㓕而自真實相不㓕非自真實相㓕但業相㓕若自真實相㓕者蔵識則㓕蔵識㓕者不異外道斷見論議又破外道斷見云若識流注㓕者無始流注應斷又云水流處蔵識轉識浪生又云外境界風飄蕩心海識浪不斷又偈云蔵識海常住境界風所動種種諸識浪騰躍而轉生又偈云凡夫無智慧蔵識如巨海業相猶波浪依彼譬類通第二卷有云一切自性習氣蔵意意識習見轉變名為涅槃註云自性習氣謂衆生心識性執熏習氣分蔵意意識者即蔵識與事識由愛見妄想之所熏習轉變者謂轉蔵識事識為自覺聖智境界也有云識者因樂種種跡境界故餘趣相續有云外道四種涅槃非我所說法我所說者妄想識㓕名為涅槃有云意識者境界分叚計着生習氣長養蔵識意俱我我所計着思惟因縁生不壊身相蔵識因攀縁自心現境界計着心聚生展轉相因譬如海浪自心現境界風吹若生若㓕亦如是是故意識㓕七識亦㓕註云境界分叚者六識從六塵生也習氣長養者言六識不離七識八識也我我所計着者言七識我執從思惟彼因彼縁而生不壊身相蔵識即第八識謂此八識因於六識能縁還縁自心所現境界以計着故而生六識能總諸心故云心聚生也展轉相因者八識轉生諸識六識起善起惡七識則傳送其間海喻八識浪喻六識以六塵為境界風境界乃自心所現還吹八識心海轉生諸識若生若㓕亦猶依海而有風因風而鼓浪風息則浪㓕故云意識㓕七識亦㓕也又偈云心縳於境界覺想智隨轉無所有及勝平等智慧生註云現前一念為塵境所轉故有業縳而本有覺智亦随妄而轉若了妄即真離諸有相及至佛地則復平等大慧矣第三卷有云彼生㓕者是識不生不㓕者是智堕相無相及墮有無種種相因是識超有無相是智長養相是識非長養相是智又云無礙相是智境界種種礙相是識三事和合生方便相是識無事方便自性相是智得相是識不得相是智自得聖智境界不出不入如水中月註云根塵及我和合相應而生是識此不知自性相故若知性相則一念靈知不假縁生故云無事方便自性相是智相惟是一而有離不離之異故云得不得也又偈云心意及與識逺離思惟想得無思想法佛子非聲聞寂静勝進忍如來清浄智生於善勝義所行悉逺離註云得無思想法則轉識為智此是菩薩而非聲聞智之始也寂静勝進忍即如來清浄忍智智之終也第四卷有云如來之蔵是善不善因能徧興造一切趣生譬如伎兒變現諸趣離我我所不覺彼故三縁和合方便而生外道不覺計着作者為無始虚偽惡習所熏名為識蔵生無明住地與七識俱如海浪身常生不斷離無常過離於我論自性無垢畢竟清浄常生不斷以上註云此隨染縁從細至粗也若能一念囘光能隨浄縁則離無常之過二我之執自性清浄所謂性徳如來則究顯矣有云菩薩摩訶薩欲求勝進者當浄如來蔵及識蔵名若無識蔵名如來蔵者則無生㓕註云識蔵以名言者由迷如來蔵轉成妄識無有别體故但有名若無識蔵之名則轉妄識為如來蔵也有云彼相者眼識所照名為色耳鼻舌身意意識所照名為聲香味觸法是名為相妄想者施設衆名顯示諸相如此不異象馬車歩男女等名是名妄想正智者彼名相不可得猶如過客諸識不生不斷不常不堕一切外道聲聞縁覺之地以此正智不立名相非不立名相離二見建立及誹謗知名相不生是名如如有云善不善者謂八識何等謂八謂如來蔵名識蔵心意意識及五識身非外道所說五識身者心意意識俱善不善相展轉變壊相續流注不壊身生亦生亦㓕不覺自心現次第㓕餘識生形相差别攝受意識五識俱相應生刹那時不住註云不壊者不斷也攝受意識者以五根攬五塵攝歸意識起善起惡有云愚夫依七識身㓕起斷見不覺識蔵故起常見自妄想故不知本際自妄想慧㓕故觧脫註云愚夫所知極於七識七識之外無所知故因起斷見而不覺識蔵無盡見其念念相續故起常見由其自妄想内而不及外故不能知本際然妄不自㓕必由慧而㓕也又偈云意識之所起識宅意所住意及眼識等斷㓕說無常或作涅槃見而為說常住註云意由八識而起而八識意之所住故謂之為宅以是言之自不容以七識身㓕而起斷見彼又於意及眼識等斷㓕處說無常或作涅槃見者此皆凡外自妄想見故不知本際如來為是說常住也經中言識首尾具於此矣間有牽渉他文者不暇盡録然已不勝其多亦無庸盡録為也其首之以諸識有二種生住㓕乃其所謂生死根也終之以識宅常住乃其所謂涅槃相也然而生死即涅槃涅槃即生死此是佛家本語初無二相故諸識雖有種種名色實無二體但迷之則為妄悟之則為真茍能㓕妄識而契真識則有以超生死而證涅槃矣真識即本覺也涅槃即所覺之境界也由此觀之佛氏之所謂性有出於知覺之外邪雖其言反覆多端窮其本末不過如此然驟而觀之者或恐猶有所未逹也輙以蔵識為主而分為數類以盡其義蔵即所謂如來蔵也以其含蔵善惡種子故謂之蔵其所以為善為惡識而已矣故曰蔵識蔵識一爾而有本有末曰真相曰真識曰真實相曰無始流注曰蔵識海曰涅槃曰平等智慧曰不生不㓕等是智曰如來清浄智曰自性無垢畢竟清浄曰識宅曰常住此為一類皆言乎其本體也曰流注生住㓕相生住㓕曰業相曰分别事識曰識浪曰樂種種跡境界曰意識曰生㓕等是識曰識蔵生住地無明與七識俱如海浪身常生不斷曰識蔵名曰心意意識及五識身曰意及眼識等此為一類皆言乎其末流也曰轉相曰現識曰轉識曰覺想智随轉此為一類言乎本末之所由分也其言及脩行處又當自為一類如曰諸虚妄㓕則一切根識㓕曰見習轉變名為涅槃曰妄想識㓕名為涅槃曰意識㓕七識亦㓕曰無所有及勝曰逺離思惟想曰離無常過離於我論曰欲求勝進者當浄如來蔵及識蔵名若無識蔵名如來蔵者則無生㓕曰自妄想慧㓕故觧脫凡此皆言其脩行之法也欲窮其說者合此數類而詳玩之則知余所謂㓕妄識而契真識誠有以得其要領矣夫識者人心之神明耳而可認為性乎且其以本體為真末流為妄既分本末為兩截謂迷則真成妄悟則妄即真又混真妄為一途盖所見既差故其言七顛八倒更無是處吾黨之號為聰明特逹者顧不免為其所惑豈不深可惜哉佛氏分本末為兩截混真妄為一途害道之甚無過於此不可但如此說過湏究言之夫以心識為本六識為末固其名之不可易者然求其實初非心識之外别有所謂六識也又非以其本之一分而為末之六也盖凡有所視則全體在目有所聽則全體在耳有所言則全體在口有所動則全體在身只就此四件說取簡而易見爾所謂感而遂通便是此理以此觀之本末明是一物豈可分而為二而以其半為真半為妄哉若夫真妄之不可混則又可得而言矣夫目之視耳之聽口之言身之動物雖未交而其理已具是皆天命之自然無假於安排造作莫非真也及乎感物而動則有當視者有不當視者有當聽者有不當聽者有當言者有不當言者有當動者有不當動者凡其所當然者即其自然之不可違者故曰真也所不當然者則徃徃出於情欲之使然故曰妄也真者存之妄者去之以此治其身心以此逹諸家國天下此吾儒所以立人極之道而内外本末無非一貫也若如佛氏之說則方其未悟之先凡視聽言動不問其當然與不當然一切皆謂之妄及其既悟又不問其當然與不當然一切皆謂之真不知何者在所當存何者在所當去當去者不去當存者不存人欲肆而天理滅矣使其説肆行而莫之禁中國之為中國人類之為人類將非幸歟楞伽四卷並無一理字註中却多用理字訓釋其說盖本他經之文爾嘗見楞嚴有云理則䪺悟乗悟併銷圓覺有云一者理障礙正知見二者事障續諸生死事理二障在楞伽但謂之惑障智障爾非逃儒歸佛者誰能易之雖其所用理字不過指知覺而言初非吾儒所謂性命之理然言之便足以亂真不可不辨𫝊習録有云吾心之良知即所謂天理也又云道心者良知之謂也又云良知即是未發之中雍語有云學問思辨篤行所以存養其知覺又有問仁者以天地萬物為一體答曰人能存得這一㸃生意便是與天地萬物為一體又問所謂生者即活動之意否即所謂虚靈知覺否曰然又曰性即人之生意此皆以知覺為性之明驗也達磨所尊信者惟楞伽凡其切要之言余既聮比而貫通之頗為論㫁以究極其歸趣其所以異於吾儒者彰彰明矣自逹磨而下其言之亂真者不少欲一一與之辨明未免失於繁冗將一切置而不辨又恐吾人嘗誤持其說以為是者其惑終莫之觧也乃雜取其一二尤近似者别白而究言之達磨告梁武帝有云浄智妙圓體自空寂只此八字已盡佛性之形容矣其後有神㑹者嘗著顯宗記反覆數百語說得他家道理亦自分明其中有云湛然常寂應用無方用而常空空而常用用而不有即是真空空而不無便成妙有妙有即摩訶般若真空即清浄涅槃此言又足以發盡達磨妙圓空寂之㫖余嘗合而觀之與繫辭𫝊所謂寂然不動感而遂通天下之故殆無異也然孰知其所甚異者正惟在於此乎夫易之神即人之心程子嘗言心一也有指體而言者寂然不動是也有指用而言者感而遂通是也盖吾儒以寂感言心而佛氏以寂感為性此其所為甚異也良由彼不知性為至精之理而以所謂神者當之故其應用無方雖不失圓通之妙而髙下無所凖輕重無所權卒歸於㝠行妄作而已矣與吾儒之道安可同年而語哉程子嘗言仁者渾然與物同體佛家亦有心佛衆生渾然齊致之語何其相似也究而言之其相逺奚啻燕越哉唐相裴休深於禪學者也嘗序圓覺經䟽首兩句云夫血氣之屬必有知凡有知者必同體此即心佛衆生渾然齊致之謂也盖其所謂齊同不出乎知覺而已矣且天地之間萬物之衆有有知者有無知者謂有知者為同體則無知者非異體乎有同有異是二本也盖以知覺為性其窒礙必至於此若吾儒所見則凡賦形於兩間者同一隂陽之氣以成形同一隂陽之理以為性有知無知無非出於一本故此身雖小萬物雖多其血氣之流通脉絡之聮屬元無絲毫空闕之處無湏臾間斷之時此其所以為渾然也然則所謂同體者亦豈待於採攬牽合以為同哉夫程子之言至言也但恐讀者看得不子細或認從知覺上去則是援儒以助佛非吾道之幸矣有物先天地無形本寂寥能為萬象主不逐四時凋此詩乃髙禪所作也自吾儒觀之昭然太極之義夫復何言然彼初未嘗知有隂陽安知有所謂太極哉此其所以大亂真也今先據佛家言語觧釋一畨使彼意既明且盡再以吾儒言語觧釋一畨然後明指其異同之實則似是之非有不難見者矣以佛家之言為據則無始菩提所謂有物先天地也湛然常寂所謂無形本寂寥也心生萬法所謂能為萬象主也常住不㓕所謂不逐四時凋也作者之意不亦明且盡乎求之吾儒之書太極生兩儀是固先天地而立矣無聲無臭則無形不足言矣富有之謂大業萬物皆一體也日新之謂盛徳萬古猶一時也太極之義不亦明且盡乎詩凡二十字其十七字彼此意義無甚異同不足深辨所當辨者三字爾物也萬象也以物言之菩提不可為太極明矣以萬象言之在彼經教中即萬法爾以其皆生於心故謂之能主然所主者實不過隂界入自此之外仰而日月星辰俯而山河大地近而君臣父子兄弟夫婦朋友逺而飛潛動植水火金石一切視以為幻而空之矣彼安得復有所謂萬象乎哉為此詩者盖嘗窺見儒書遂竊取而用之爾余於前記嘗有一說正為此等處請復詳之所謂天地間非太極不神然遂以太極為神則不可此言殊未敢易誠以太極之本體動亦定静亦定神則動而能静静而能動者也以此分明見得是二物不可混而為一故繫辭傳既曰一隂一陽之謂道矣而又曰隂陽不測之謂神由其實不同故其名不得不異不然聖人何用兩言之哉然其體則同一隂陽所以難於領㑹也佛氏初不識隂陽為何物固無由知所謂道所謂神但見得此心有一㸃之靈求其體而不可得則以為空寂推其用而偏於隂界入則以為神通所謂有物者此爾以此為性萬無是處而其言之亂真乃有如此詩者可無辨乎然人心之神即隂陽不測之神初無二致但神之在隂陽者則萬古如一在人心者則與生死相為存亡所謂理一而分殊也佛氏不足以及此矣吾黨之士盍相與精察之南陽慧忠破南方宗㫖云若以見聞覺知是佛性者浄名不應云法離見聞覺知若行見聞覺知是則見聞覺知非求法也南僧因問法華了義開佛知見此復何為忠曰他云開佛知見尚不言菩薩二乗豈以衆生癡倒便成佛之知見邪汾州無業有云見聞覺知之性與太虚齊夀不生不㓕一切境界本自空寂無一法可得迷者不了便為境惑一為境惑流轉無窮此二人皆禅林之傑出者其言皆見於𫝊燈録何若是之不同邪盖無業是本分人說本分話慧忠則所謂神出鬼没以逞其伎倆者也彼見南方以見聞覺知為性便對其人􅑃出一般說話務要髙他一着使之莫測盖桀黠者之情狀毎毎如此嘗見金剛經明有是法平等無有髙下之語佛與衆生固然迷悟不同其知見之體即是平等豈容有二又嘗見楞嚴中有兩叚語其一佛告波斯匿王云顔貎有變見精不變變者受㓕彼不變者元無生㓕其二因與阿難論聲聞有云其形雖寐聞性不昏縱汝形銷命光遷謝此性云何為汝銷㓕此皆明以見聞為性與波羅提說相合若浄名則𦂳要在一離宇余前章論之悉矣先儒嘗言佛氏之辭善遁便是此等處𫝊燈録中似此儘多究其淵源則固出於瞿曇也盖瞿曇說法常欲離四句謂一異俱不俱有無非有無非常無常然而終有不能離者如云非異非不異非有非無非常非無常只楞伽一經累累見之此便是遁辭之根若將異處窮着他他便有非異一說將無常窮着他他便有非無常一說自非灼然看得他破只得聽他愚弄爾大慧禅師宗杲者當宋南渡初為禅林之冠有語録三十卷頃嘗徧閱之直是㑹說左來右去神出鬼沒所以能聳動一世渠嘗拈出一叚說話正余所欲辨者今具於左僧問忠國師古徳云青青翠竹盡是法身鬱鬱黄華無非般若有人不許云是邪說亦有信者云不思議不知若為國師曰此是普賢文殊境界非諸凡小而能信受皆與大乗了義經合故華嚴經云佛身充滿於法界普現一切羣生前隨縁赴感靡不周而恒處此菩提座翠竹既不出於法界豈非法身乎又般若經云色無邉故般若亦無邉黄華既不越於色豈非般若乎深逺之言不省者難為措意又華嚴座主問大珠和尚云襌師何故不許青青翠竹盡是法身鬱鬱黄華無非般若珠曰法身無像應翠竹以成形般若無知對黄華而顯相非被黄華翠竹而有般若法身故經云佛真法身猶若虚空應物現形如水中月黄華若是般若般若即同無情翠竹若是法身翠竹還能應用座主㑹麽曰不了此意珠曰若見性人道是亦得道不是亦得隨用而說不滯是非若不見性人說翠竹着翠竹說黄華着黄華說法身滯法身說般若不識般若所以皆成諍論宗杲云國師主張翠竹是法身直主張到底大珠破翠竹不是法身直破到底老漢將一箇主張底一箇破底收作一處更無拈提不敢動著他一絲毫要你學者具眼余於前記嘗舉翠竹黄華二語以為與鳶飛魚躍之言絶相似只是不同欲吾人識其所以不同處盖引而未發之意今偶為此異同之論所激有不容不盡其言者矣據慧忠分析語與大珠成形顯相二言便是古徳立言本㫖大珠所以不許之意但以黄華翠竹非有般若法身爾其曰道是亦得即前成形顯相二言曰道不是亦得即後非彼有般若法身一言也慧忠所引經語與大珠所引經語皆合直是明白更無餘藴然則其與吾儒鳶飛魚躍之義所以不同者果何在邪誠以鳶魚雖微其性同一天命也飛躍雖殊其道同一率性也彼所謂般若法身在花竹之身之外吾所謂天命率性在鳶魚之身之内在内則是一物在外便成二物二則二本一則一本詎可同年而語哉且天命之性不獨鳶魚有之花竹亦有之程子所謂一草一木亦皆有理不可不察者正惟有見乎此也佛氏秪縁認知覺為性所以於花竹上便通不去只得以為法界中所現之物爾楞伽以四大種色為虚空所持楞嚴以山河大地咸是妙明真心中物其義亦猶是也宗杲於兩家之說更不拈動總是占便宜却要學者具眼殊不失為人之意余也向雖引而不發今則舎矢如破矣吾黨之士夫豈無具眼者乎宗杲甞謂士人鄭尚明曰你只今這聽法說法一段歴歴孤明底未生已前畢竟在甚麽處曰不知杲曰你若不知便是生大你百歲後四大五藴一時觧散到這裏歴歴孤明底却向甚麽處去曰也不知杲曰你既不知便是死大又嘗示吕機宜云現今歴歴孤明與人分是非别好醜底决定是有是無是真實是虚妄前此臨濟亦嘗語其徒曰四大身不觧說法聽法虚空不解說法聽法是汝目前歴歴孤明勿形叚者解說法聽法觀此數節則佛氏之所謂性亦何難見之有渠道理只是如此本不須苦求解悟然而必以悟為則者只是要見得此歴歴孤明境界更親切爾縱使見得親切夫安知歴歴孤明者之非性而性自有真邪杲答曾天游侍郎第二書說得他家道理直是明盡渠最善揑怪却有此等說話又不失為本分人也書云尋常計較安排底是識情随生死遷流底亦是識情怕怖慞惶底亦是識情而今參學之人不知是病只管在裏許頭出頭沒教中所謂隨識而不隨智以故昧却本地風光本來面目若或一時放下百不思量計較忽然夫脚蹋著鼻孔即此識情便是真空妙智更無别智可得若别有所得有所證則又却不是也如人迷時喚東作西及至悟時即西便是東無别有東此真空妙智與太虚空齊夀只這太虚空中還有一物礙得他否雖不受一物礙而不妨諸物於空中徃來此真空妙智亦然凡聖垢染着一㸃不得雖着不得而不礙生死凡聖於中徃來如此信得及見得徹方是箇出生入死得大自在底漢細觀此書佛氏之所謂性無餘藴矣忽然失脚蹋着鼻孔便是頓悟之說杲示真如道人有云今生雖未悟亦種得般若種子在性地上世世不落惡趣生生不失人身不生邪見家不入魔軍類又答吕舎人書有云若依此做工夫雖不悟徹亦能分别邪正不為邪魔所障亦種得般若種子深縱今生不了來生出頭現成受用亦不費力亦不被惡念奪将去臨命終時亦能轉業况一念相應邪又答湯丞相書有云若存心在上面縱今生未了亦種得種子深臨命終時亦不被惡業所牽墮諸惡趣換却殻漏子轉頭來亦昧我底不得此等說話只是誘人信嚮豈可為憑人情大抵多貪都不曾見箇道理貪今生受用未了又要貪來生受用安得不為其所惑也易曰原始反終故知死生之說生死輪廻决無此理萬有一焉只是妖妄為學而不能無疑於此則亦何以窮理為哉杲答吕舎人書有云心無所之老䑕入牛角便見倒斷也倒斷即是悟處心無所之是做工夫處其做工夫只看話頭便是如狗子無佛性鋸解秤錘栢樹子竹篦子麻三斤乾屎橛之類皆所謂話頭也余於栢樹子話偶嘗騐過是以知之然向者一悟之後佛家書但過目便迎刃而解若吾聖賢之微詞奥㫖竟不能通後來用工久之始知其所以然者盖佛氏以知覺為性所以一悟便見得箇虚空境界證道歌所謂了了見無一物亦無人亦無佛是也渠千言萬語只是說這箇境界悟者安有不省若吾儒之所謂性乃帝降之𠂻至精之理細入於絲毫杪忽無一非實與彼虚空境界判然不同所以决無頓悟之理世有學襌而未至者畧見些光影便要將兩家之說和合而為一彌縫雖巧敗闕處不可勝言弄得來儒不儒佛不佛心勞日拙畢竟何益之有梁武帝問逹磨曰朕即位以來造寺冩經度僧不可勝紀有何功徳答曰並無功徳帝曰何以無功德答曰此但人天小果有漏之因如影隨形雖有非實又宗杲答曾侍郎書有云今時學道之士只求速效不知錯了也却謂無事省縁静坐體究為空過時光不如看㡬卷經念㡬聲佛佛前多禮㡬拜懴悔平生所作罪過要免閻家老子手中鐵棒此是愚人所為嗚呼自佛法入中國所謂造寺冩經供佛飯僧看經念佛種種糜費之事日新而月盛但其力稍可為者靡不争先為之導之者固其徒向非人心之貪則其說亦無縁而入也柰何世之謟佛以求福利者其貪心惑志纒綿固結而不可解雖以吾儒正色昌言懇切詳盡一切聞如不聞彼盖以吾儒未諳佛教所言無足信也達磨在西域稱二十八祖入中國則為禪家初祖宗杲擅名一代為禪林之冠所以保䕶佛法者皆無所不用其心其不肯失言决矣乃至如上所云種種造作以為無益者前後如出一口此又不足信邪且夫貪嗔癡三者乃佛氏之所深戒也謂之三毒凡世之造寺冩經供佛飯僧看經念佛以為有益而為之是貪也不知其無益而為之是癡也三毒而犯其二雖活佛在世亦不能為之解脫乃欲謟事土佛木佛以僥倖於萬一非天下之至愚至愚者乎凡吾儒解惑之言不可勝述孰意佛書中乃有此等本分說話人心天理誠有不可得而泯㓕者矣余是用表而出之有丹霞燒木佛一事亦可以解愚夫之惑儒書有五行佛家便言四大儒書有五事佛家則言六根其蹈襲邪抑偶同邪是不可得而知也然名物雖相似其義理則相遼絶矣四大有風而無金木楞嚴又從而附益之揣摩湊合都無義理只被他粧㸃得好故足以惑人朱子嘗言佛書中惟楞嚴最巧頗疑房融竄入其說看來此事灼然無足疑者且如楞伽四卷達磨最所尊信其言大抵質實而近乎拙有若欲盡其意而未能者佛一人爾人一口爾以二經較之不應其言之工拙頓異如此此本無足深辨但既攻其失則亦不可不知又以見佛學溺人之深有如是之才而甘心為之役殊可嘆也昔有儒生悟襌者嘗作一頌云斷除煩惱重増病趣向真如亦是邪隨順世縁無罣礙涅槃生死是空華宗杲取之嘗見杲示人有水上葫蘆一言凡屢出此頌第三句即水上葫蘆之謂也佛家道理真是如此論語有云君子之於天下也無適也無莫也義之與比使吾夫子當時若欠却義之與比一語則所謂無適無莫者何以異於水上葫蘆也哉韓子之闢佛老有云其亦幸而出於三代之後不見黜於禹湯文武周公孔子也其亦不幸而不出於三代之前不見正於禹湯文武周公孔子也善哉言乎自今觀之其幸也未若其不幸之甚景徳𫝊燈録所載舊云千七百人其𤨏𤨏者姑未論若夫戒行之清苦建立之精勤論辨之通明語句之超邁記覽之該博亦何下百十人此其人亦皆有過人之才要為難得向使獲及吾聖人之門而取正焉所成就當何如也而皆畢竟落空以死鳴呼兹非其不幸之甚而何吾儒之闢佛氏有三有真知其說之非而痛闢之者兩程子張子朱子是也有未能深知其說而常喜闢之者篤信程張數子者也有隂實尊用其說而陽闢之者盖用禪家訶佛罵祖之機者也夫佛氏似是之非固為難辨至於訶佛罵祖之機作則其辨之也愈難吁可畏哉程子之闢佛氏有云自謂之窮神知化而不足以開物成務言為無不周徧實則外於倫理窮深極微而不可與入堯舜之道即其所言所造而明指其罪過誅絶之意凛然辭氣之表矣夫既不足以開物成務則不得謂之神化倫理且棄而不顧尚何周徧之有堯舜之道既不可入又何有於深微盖神化周徧深微之云皆彼之所自謂非吾聖人所謂神化周徧深㣲者也韓子云道其所道非吾所謂道也徳其所徳非吾所謂徳也此之謂也他日程子又嘗有言佛氏不識隂陽書夜死生古今安得謂形而上者與聖人同乎夫隂陽晝夜死生古今易之體也深㣲者易之理神化者易之用也聖人全體皆易故能範圍天地之化而不過曲成萬物而不遺佛氏昧焉一切㝠行妄作至於㓕絶彛倫而不知悔此其所以獲罪於天有不可得而贖者吾儒之誅絶之亦惟順天而已豈容一毫私意於其間哉程子曰佛有箇覺之理可以敬以直内矣然無義以方外其直内者要之其本亦不是此言雖簡而意極圓備其本不是正斥其認知覺以為性爾故非但無以方外内亦未嘗直也當詳味可以二字非許其能直内之辭程子嘗言聖人本天釋氏本心直是見得透斷得明也本既不同所以其說雖有相似處畢竟和合不得吕原明一生問學欲直造聖人且嘗從二程遊亦稔聞其議論矣及其晚年乃見得佛之道與吾聖人合反謂二程所見太近得非誤以妙圓空寂為形而上者邪以此希聖無異適燕而南其轅蔑由至矣張子曰釋氏不知天命而以心法起㓕天地以小縁大以末縁本其不能窮而謂之幻妄真所謂疑冰者歟此言與程子本心之見相合又推到釋氏窮處非深知其學之本末安能及此程張闢佛氏之言見於遺書及正䝉者多矣今但舉其尤切要者著於篇以明吾說之有所據其他皆吾人之所通習無庸盡述也朱子闢佛氏之言比之二程子張子尤為不少今亦無庸盡述録其尤著明者一章凡今之謗朱子者無他恐只是此等處不合說得太分曉未免有所妨礙爾朱子嘗語學者云佛家都從頭不識只是認知覺運動做性所以鼔舞得許多聰明豪傑之士縁他是髙於世俗世俗一副當汚濁底事他是無了所以人競趨他之學或曰彼以知覺運動為形而下者空寂為形而上者如何曰便只是形而下者他只是將知覺運動做𤣥妙說或曰如此則安能動人必更有𤣥妙處曰便只是這箇他那妙處離這知覺運動不得無這箇便說不行只是被他作弄得來精所以横渠有釋氏兩末之論只說得兩邊末梢頭中間真實道理却不曾識如知覺運動是其上一稍也因果報應是其下一梢也或曰因果報應他那邊有見識者亦自不信曰雖有不信底依舊離這箇不得如他㡬箇髙禪縱說髙煞也依舊掉舎這箇不下將去愚人他那箇物事没理㑹捉摸他不得你道他如此說又說不如此你道他是知覺運動他又有時掉翻了都不說時雖是掉翻依舊離這箇不得或曰今也不消學他那一層只認依着自家底做便了曰固是豈可學他只是依自家底做少間自見得他底低觀此一章則知愚前所謂洞見其肺腑而深中其膏盲之病誠有據矣朱子語類有云道謙言大蔵經中言襌子病脾時只坐禪六七日减食便安謙言渠曾病坐得三四日便無事李延平所稱謙開善者必此人也謂朱子嘗從渠用工夫來於此可見然朱子後來盡棄前習以歸於正非全具知仁勇三徳不能其為百世師也殆無愧矣今之道家盖源於古之巫祝與老子殊不相干老子誠亦異端然其為道主於深根固蒂長生久視而已道徳五千言具在於凡祈禳禜禱經呪符籙等事初未有一言及之而道家立教乃推尊老子置之三清之列以為其教之所從出不亦妄乎古者用巫祝以事神建其官正其名辨其物盖誠有以通乎幽明之故故專其職掌俾常一其心志以𨗳迎二氣之和其義精矣去古既逺精義浸失而􅁋邪妖誕之說起所謂經呪符籙大抵皆秦漢間方士所為其冺㓕而不𫝊者計亦多矣而終莫之能絶也今之所𫝊分明逺祖張道陵近宗林靈素軰雖其為用不出乎祈禳禜禱然既已失其精義則所以交神明者率非其道徒滋益人心之惑而重為世道之害爾望其消災而致福不亦逺乎盖老子之善成其私固聖門所不取道陵軰之譸張為幻又老子之所不屑為也欲攻老氏者須分為二端而各明辨其失則吾之說為有據而彼雖桀黠亦無所措其辭矣老子外仁義禮而言道徳徒言道徳而不及性與聖門絶不相似自不足以亂真所謂彌近理而大亂真惟佛氏爾列子莊子出入老佛之間其時佛法未入中國也而其言之相合者已自不少易大𫝊曰仁者見之謂之仁知者見之謂之知是安有華夷之别古今之異邪理固然矣聖人所見無非極致則雖或生於千百世之上或生於千百世之下或相去千萬里之逺其道安有不同故凡謂佛為聖人者皆非真知聖道者也黄老於漢佛於晉魏梁隋之間韓子之言是也然佛學在唐尤盛在宋亦盛夷狄之禍所以相尋不絶何足怪哉程朱數君子相繼而出相與推明孔孟之正學以救當世之淪胥者亦既諄諄懇懇而世莫之能用也直至我朝其說方盛行於天下孔孟之道於是復明雖學者之所得不必皆深所行不必皆力然譬諸梓匠輪輿必以規矩巧或不足終不失為方員亦足以成噐而適用矣近來異說紛起直欲超然於規矩凖繩之外方員平直惟其意之所裁觚哉觚哉此言殊可念也有世道之責者不逺為之慮可乎朱子嘗言伊川性即理也一語便是千萬世說性之根基愚初發憤時常將此語體認認來認去有處通有處不通如此累年竟不能歸一却疑伊川此語有所未盡朱子亦恐說得太過難為必信也遂姑置之乃將理氣二字參互體認認來認去一般有處通有處不通如此又累年亦竟不能歸一心中甚不快以謂識見有限終恐無能上逹也意欲已之忽記起雖愚必明之言又不能已乃復從事於伊川之語反覆不置一旦於理一分殊四字有箇悟處反而驗之身心推而驗之人人又驗之隂陽五行又驗之鳥獸草木頭頭皆合於是始渙然自信而知二君子之言斷乎不我欺也愚言及此非以自多盖嘗屢見吾黨所著書有以性即理為不然者只為理字難明徃徃為氣字之所妨礙纔見得不合便以先儒言說為不足信殊不知工夫到後雖欲添一箇字自是添不得也理無徃而不定不定即非所以為理然學者窮理須是看得活不可滯泥先儒多以善觀為言即此意也若看得活時此理便活潑潑地常在面前雖然如此要添一毫亦不得减一毫亦不得要擡髙一分亦不得放下一分亦不得以此見理無徃而不定也然見處固是如此向使存養之功未至則此理終非已有亦無縁得他受用故曰知及之仁不能守之雖得之必失之窮理譬則觀山山體自定觀者移歩其形便不同故自四方觀之便是四般面目自四隅觀之又各是一般面目面目雖種種各别其實只是此一山山之本體則理一之譬也種種面目則分殊之譬也在人所觀之處便是日用間應接之實地也理只是氣之理當於氣之轉折處觀之徃而來來而徃便是轉折處也夫徃而不能不來來而不能不徃有莫知其所以然而然若有一物主宰乎其間而使之然者此理之所以名也易有太極此之謂也若於轉折處看得分明自然頭頭皆合程子嘗言天地間只有一箇感應而已更有甚事夫徃者感則來者應來者感則徃者應一感一應循環無已理無徃而不存焉在天在人一也天道惟是至公故感應有常而不忒人情不能無私欲之累故感應易忒而靡常夫感應者氣也如是而感則如是而應有不容以毫髪差者理也適當其可則吉反而去之則凶或過焉或不及焉則悔且吝故理無徃而不定也然此多是就感通處說須知此心雖寂然不動其冲和之氣自為感應者未始有一息之停故所謂亭亭當當直上直下之正理自不容有須臾之間此則天之所命而人物之所以為性者也愚故嘗曰理須就氣上認取然認氣為理便不是此言殆不可易哉余自入官後嘗見近時十數種書於宋諸大儒言論有明詆者有暗詆者直是可怪既而思之亦可憐也坐井觀天而曰天小不自知其身在井中爾然或徃告之曰天非小也子盍從井外觀之彼方溺於坐井之安堅不肯出亦將如之何哉嗚呼斯固終歸於愚而已矣諸大儒言語文字豈無小小出入處只是大本大原上見得端的故能有以發明孔孟之㣲㫖使後學知所用力之方不為異說之所迷惑所以不免小有出入者盖義理真是無窮其間細微曲折如何一時便見得盡後儒果有所見自當信得及於其小小出入處不妨為之申明亦先儒以俟後之君子之本意也心有所忿則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正每嘗玩味此章所謂不得其正者似只指心體而言章句以為用之所行不能不失其正乃第二節事似於心體上欠却數語盖心不在焉以下方是說應用之失視聽飲食一切當面蹉過則喜怒憂懼之發鮮能中節也可知故欲修其身者必先正其心其義明矣又詳有所二字只是說人情偏處盖人之常情有多喜者有多怒者有多懼者有多憂者但一處偏重便常有此一物横在胷中未免礙却正當道理此存養省察之功所以不可須臾忽也大抵大學正心工夫與中庸致中無異中庸章句所謂至静之中無少偏倚便是心得其正之狀也蔡介夫嘗述王端毅公語謂經筵進講此章每句貼一先字以為未當看來情既有偏則或先或後皆能為病但不可指殺一處說爾公所著有石渠意見一編與朱子頗有未合處舊嘗一見之惜未及詳讀也近時格物之說亦未必故欲求異於先儒也秪縁誤認知覺為性纔干渉事物便說不行既以道學名置格物而不講又不可而致知二字略與其所見相似難得來做箇題目所以别造一般說話要將物字牵拽向裏來然而畢竟牽拽不得分定故也向裏既不得向外又不通明是兩無歸着盍於此反而思之茍能姑舎其所已見者虚心一意懇求其所未見者性與天道未必終不可見何苦費盡許多氣力左籠右罩以重為誠意正心之累哉論語首篇首以學為言然未嘗明言所學者何事盖當時門弟子皆已知所從事不待言也但要加時習之功爾自今觀之子以四教文行忠信夫子之所以教非學者之所學乎是知學文脩行皆要時時習之而忠信其本尤不可須臾失焉者也註所謂效先覺之所為亦不出四者之外若如陸象山之說只一箇求放心便了然則聖門之學與釋氏又何異乎中庸首言戒懼慎獨即大學正心誠意工夫似少格物致知之意何也盖篇首即分明指出道體正欲學者於言下領㑹雖不言知而知在其中矣末章復就下學立心之始說起却少知字不得所以說知逺之近知風之自知㣲之顯曰近曰自曰㣲皆言乎其本體也性也曰逺曰風曰顯皆言乎其發用也道也知此則有以見夫内外本末初無二理戒懼慎獨方有着力處故曰可與入徳矣大學所謂知至而后意誠心正其致一也孟子曰孩提之童無不知愛其親也及其長也無不知敬其兄也以此實良知良能之說其義甚明盖知能乃人心之妙用愛敬乃人心之天理也以其不待思慮而自知此故謂之良近時有以良知為天理者然則愛敬果何物乎程子嘗釋知覺二字之義云知是知此事覺是覺此理又言佛氏之云覺甚底是覺斯道甚底是覺斯民正斥其認知覺為性之謬爾夫以二子之言明白精切如此而近時異說之興聽者曾莫之能辨則亦何以講學為哉性之理一而已矣名其徳則有四焉以其渾然無間也名之曰仁以其燦然有條也名之曰禮以其截然有止也名之曰義以其判然有别也名之曰智凡其燦然截然判然者皆不出於渾然之中此仁之所以包四徳而為性之全體也截然者即其燦然之不可移者也判然者即其截然之不可亂者也名雖有四其實一也然其所以如是之渾然燦然截然判然莫非自然而然不假纎毫安排布置之力此其所以為性命之理也上天之載無聲無臭又安有形體可覔邪然自知道者觀之即事即物此理便昭昭然在心目之間非自外來非由内出自然一定而不可易所謂如有所立卓爾非想像之辭也佛氏以寂㓕為極致與聖門卓爾之見絶不相同彼曠而虚此約而實也果然見到卓爾處異說如何動得以覺言仁固非以覺言智亦非也盖仁智皆吾心之定理而覺乃其妙用如以妙用為定理則大傳所謂一隂一陽之謂道隂陽不測之謂神果何别邪朱子嘗言神亦形而下者又云神乃氣之精英須曾實下工夫體究來方信此言確乎其不可易不然則誤以神為形而上者有之矣黄直卿嘗疑中庸論鬼神有誠之不可掩一語則是形而上者朱子答以只是實理處發見其義愈明先天圖最宜潛玩性命之理直是分明分隂分陽太極之體以立一隂一陽太極之用以行若玩得熟時便見得一本之散為萬殊萬殊之原於一本無非自然之妙有不知手之舞之足之蹈之者矣聖贒千言萬語無非發明此理有志於學者必須熟讀精思将一箇身心入在聖贒言語中翻來覆去體認窮究方尋得道理出從上諸儒先君子皆是如此用工其所得之淺深則由其資稟有髙下爾自陸象山有六經皆我註脚之言流及近世士之好髙欲速者將聖贒經書都作没𦂳要看了以為道理但當求之於心書可不必讀讀亦不必記亦不必苦苦求解看來若非要作應舉用相將坐襌入定去無復以讀書為矣一言而貽後學無窮之禍象山其罪首哉宰我子貢善為說辭冉牛閔子顔淵善言徳行孔子兼之看來說得道理分明自是難事見之不真者不待論亦有心下了了而發脫不出者却是口才短也此則須要涵養涵養得熟終久說出來亦無病痛若本無實見而揣摩想像以為言言語雖工文字雖妙其病痛必不能免卲子觀物外篇有云氣一而已主之者乾也朱子易本義所謂天地間本一氣之流行而有動静爾以其流行之統體而言則但謂之乾而無所不包與卲說合又云神亦一而已乗氣而變化能出入于有無生死之間無方而不測者也如此則神别是一物與朱子所謂氣之精英不合異同之際學者不可不致思也即子有神無方而性有質一言亦見得好但質字未善欲作定字亦未知如何大抵理最難言得失只在一兩字上故易文言有脩辭之訓只要說得端的便是立其誠也先儒言情是性之動意是心之發發動二字亦不相逺却說得情意二字分明盖情是不待主張而自然發動者意是主張如此發動者不待主張者須是與他做主張方能中節由此心主張而發者便有公私義利兩途須要詳審二者皆是慎獨工夫主佩倚則臣佩垂主佩垂則臣佩委凡為長者糞之禮必加帚於箕上以袂拘而退其塵不及長者以箕自向而扱之並坐不横肱授立不跪授坐不立上於東階則先右足上於西階則先左足此等皆是粗迹感應之理便在其中只要人識得故程子曰灑掃應對便是形而上者理無大小故也若於事物上無所見談𤣥說妙有何交渉莫之為而為莫之致而至便是天理程子此言最盡最好尋思若讀書不精此等切至之言都當面蹉過矣天地人物止是一理然而語天道則曰隂陽語地道則曰剛柔語人道則曰仁義何也盖其分既殊其為道也自不容於無别然則鳥獸草木之為物亦云庶矣欲名其道夫豈可以一言盡乎大抵性以命同道以形異必明乎異同之際斯可以盡天地人物之理洪範之五行在大禹謨則謂之六府皆以其質言之人之所頼以生者也盖五行之質惟人有以兼而用之其他有知之物或用其二或用其三更無能用火金者此人之所以靈於萬物也歟若夫創制之始裁成之妙聖人之功誠所謂萬世永頼者矣一動一静之間天地人之至妙至妙者本卲子第一親切之言其子伯温解註却說得胡塗了李習之雖嘗闢佛然䧟於其說而不自知復性書有云情者妄也邪也曰邪與妄則無所因矣妄情㓕息本性清明周流六虚所以謂之能復其性也觀乎此言何以異於佛氏其亦嘗從襌師問道得非有取其㣲㫖而姑闢其粗迹以無失為聖人之徒邪且其書三篇皆及死生之說尤可見其意之所主陸象山與詹子南書有云日享事實之樂即語録中所謂此理已顯者也其與晦翁辨無極書所謂言論未詳事實先著余嘗意其指識此心為事實今始騐得分明包顯道所録象山語有云仰首攀南斗翻身倚北辰舉頭天外望無我這般人按𫝊燈録智通禪師臨終有偈云舉手攀南斗廽身倚北辰出頭天外見誰是我般人不知象山之言其偶同邪抑真有取於智通之說也元之大儒稱許魯齋呉草廬二人魯齋始終尊信朱子其學行皆平正䔍實遭逢世祖致位通顯雖未得盡行其志然當其時而儒者之道不廢虞伯生謂魯齋實啟之可謂有功於斯文矣草廬初年䔍信朱子其進甚銳晚年所見乃與陸象山合其出處一節自難例之魯齋若夫一生惓惓焉羽翼聖經終老不倦其志亦可尚矣劉静修天分甚髙學博才雄議論英發當時推重殆與許魯齋呉草廬等然以愚觀之謂之有志於聖人之道則可謂其有得乎聖人之道恐未然也姑舉所疑之一二以俟知言者㫁焉退齋記有云凡事物之肖夫道之體者皆洒然而無所累變通不可窮也即如其言則是所謂道體者當别為一物而立乎事物之外而所謂事物者不容不與道體為二茍有肖焉亦必有弗肖者矣夫器外無道道外無器所謂器亦道道亦器是也而顧可二之乎又叙學一篇似乎枝葉盛於根本其欲令學者先六經而後語孟與程朱之訓既不相合又令以詩書禮為學之體春秋為學之用一貫本末具舉天下之理理窮而性盡矣窮理盡性以至於命而後學夫易此言殊為可疑夫易之為書所以教人窮理盡性以至於命也茍能窮理盡性以至於命則學易之能事畢矣而又何學焉性命之理他經固無不具然未有専言之如易之明且盡者易茍未明他經雖有所得其於盡性至命竊恐未易言也而静修言之乃爾其易語曰為之難言之得無訒乎茍嘗實用其工不應若是之易其言也得非所取者博而勇於自信之過歟又嘗評宋諸儒謂卲至大周至精程至正朱極其大盡其精而貫之以正初聞其言殊若可喜徐而繹之未為當也孰有精而不正正而不大者乎若夫出處之際議者或以其不仕為髙亦未為知静修者嘗觀其渡江一賦其心惟知有元而已所以為元計者如是其悉不仕果何義乎其不赴集贒之召實以病阻盖踰年而遂卒矣使其尚在固將相時而動以行其所求之志必不肯自安於隱逸之流也然則静修之所為可重者豈非以其有志於聖人之道乎哉劉静修之譏許魯齋頗傷於刻茍能無失其正雖進退無恒未為過也竊謂魯齋似曽子静修似子路其氣象既别所見容有不同不仕固無義然事之可否身之去就莫不有義存焉先儒之論可謂明且盡矣矧求之聖門具有成法為其學者或乃忽焉而不顧將别有所見邪凡事皆有漸其漸方萌是即所謂㡬也易曰知㡬其神乎難其人矣卲國贒簡端録近始見之於文義多所發明性命之理視近時道學諸君子較有說得親切處春秋論㫁其辭尤確獨未知盡合聖人之意否也然其博而不雜如此可敬也夫因時制宜一語最好即所謂義之與比也動皆合義則天理周流而無間而仁亦在是矣是故君子之用不偏於剛不偏於柔惟其時而已矣時宜用剛而剛時宜用柔而柔只是大體如此須知剛之用不可無柔柔之用不可無剛無柔以濟其剛或足以致悔無剛以制其柔或足以取吝陽動隂静其大分固然然自其流行處觀之静亦動也自其主宰處觀之動亦静也此可為知者道爾規模寛大條理精詳最為難得為學如此為政亦如此斯可謂真儒矣所謂無意者無私意爾自日用應酬之常以至彌綸㕘贊之大凡其設施運用斟酌裁制莫非意也胡可云無惟一切循其理之當然而已無預焉斯則所謂無意也已凡經書文義有解說不通處只宜闕之盖年代悠邈編簡錯亂字畫差訛勢不能免必欲多方牽補强解求通則鑿矣自昔聰明博辨之士多喜做此等工夫似乎枉費心力若真欲求道㫁不在此忠信二字吾夫子屢以為言此實人道之本也常人無此猶不可以自立於鄉黨况君子之學期於成已成物者乎若於忠信有所不足則終身之所成就從可知矣成已成物便是感應之理理惟一爾得其理則物我俱成故曰合内外之道也子曰君子喻於義小人喻於利又曰君子上逹小人下逹喻於義斯上達矣喻於利斯下達矣上逹則進於聖贒下達則其違禽獸也不逺矣有人於此或以禽獸斥之未有能甘心受之者至於義利之際乃或不知所擇果何說邪富貴貧賤死生夀夭之命與性命之命只是一箇命皆定理也明乎理之一則有以知夫命之一矣誠知夫命之一則修身以俟之一語豈不簡而易守乎程子論大學則曰學者必由是而學焉則庶乎其不差矣論語孟則曰人只看得此二書切已終身儘多也論中庸則曰善學者玩索而有得焉則終身用之有不能盡者矣為人之意何其惓惓若是哉愚於此四書童而習之今皓首矣差則幸而免至求其切已受用處殊覺空踈庸書以識吾愧且以申告吾徒之讀四書者困知記續録巻上
