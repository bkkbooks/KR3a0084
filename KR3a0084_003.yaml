body:
  text: 往年嘗述愚見為困知記兩卷蓋欲以告初學之士使不迷其所向焉爾惟理至難明而愚言且拙意有未盡乃復筆為是編雖詞若稍繁或頗傷直區區之意誠亦有不得已者世有君子必能亮之續刻完因贅此於末簡嘉靖辛卯夏六月丙辰整菴書
