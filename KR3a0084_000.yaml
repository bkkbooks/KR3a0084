body:
  text: 困知記儒家類提要臣等謹案困知記二卷續録二卷附録一卷明羅欽順撰欽順字允升號整菴泰和人𢎞治癸丑一甲第三人及第官至南京吏部尚書贈太子太保諡文莊事迹具明史儒林傳欽順潛心理學深有得於性命理氣之微旨晚年乃述為是編以發明之前記成於嘉靖戊子凡一百五十六章續記成於嘉靖辛卯凡一百一十三章附録一卷皆與人論學之書凡六首欽順自稱初官京師與一老僧論佛漫舉禪語為答意其必有所得為之精思達旦恍然而悟既而官南雍取聖賢之書潛玩久之漸覺就實始知所見者乃此心虛靈之妙而非性之理自此研磨體認積數十年始確有以自信蓋其學本真積力久而後得之故専以躬行實踐為務而斥王守仁良知之非嘗與守仁書講辨甚至此書摘發理奧明白直捷於後學實有啓迪之功其痛闢佛教反覆抉摘因人之所明而牖之尤為詳盡剴切髙攀龍嘗稱自唐以來排斥佛氏未有若是之明且悉者洵有禆於正學矣乾隆四十五年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀困知記序余才微而質魯志復凡近早嘗從事章句不過為利祿謀爾年幾四十始慨然有志於道雖已晚然自謂茍能粗見大意亦庶幾無負此生而官守拘牽加之多病工夫難得專一間嘗若有所見矣既旬月或踰時又疑而未定如此者蓋二十餘年其於鑽研體究之功亦可謂盡心焉耳矣近年以來乃為有以自信所以自信者何蓋此理之在心目間由本而之末萬象紛紜而不亂自末而歸本一真湛寂而無餘惟其無餘是以至約乃知聖經所謂道心惟微者其本體誠如是也故人心道心之辨明然後大本可得而立大本誠立酬酢固當沛然是之謂易簡而天下之理得山林暮景獨學無朋雖自信則爾非有異同之論何由究極其歸趣乎每遇病體稍適有所尋繹輒書而記之少或數十言多或數百言既無倫序且乏文采間有常談俗語亦不復刋削蓋初非有意於為文也積久成帙置之座間時一披閲以求其所未至同志之士有過我者則出而講之不有益於彼未必無益於我也雖然書不云乎非知之艱行之惟艱三復斯言愧懼交集記分為上下兩卷通百有五十六章名以困知著其實爾嘉靖七年歲次戊子十有一月己亥朔日南至泰和羅欽順序
