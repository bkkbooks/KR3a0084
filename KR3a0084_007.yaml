body:
  text: 困知記附錄明羅欽順撰與王陽明書庚辰夏昨拜書後一日始獲奉領所惠大學古本朱子晚年定論二編珍感珍感某無似徃在南都嘗䝉誨益第苦多病怯於話言未克傾吐所懐以求歸於一是恒用為歉去年夏士友有以傳習録見示者亟讀一過則凡向日所聞徃徃具在而他所未聞者尚多乃今又獲并讀二書何其幸也顧惟不敏再三尋繹終未能得其指歸而向日有疑嘗以面請而未决者復叢集而不可解深惟執事所以惠教之意將不徒然輙敢一二條陳仰煩開示率爾之罪度𢎞度之能容也切詳大學古本之復盖以人之為學但當求之於内而程朱格物之說不免求之於外聖人之意殆不其然於是遂去朱子之分章而削其所補之傳直以支離目之曽無所用夫當仁之讓可謂勇矣竊惟聖門設教文行兼資博學於文厥有明訓顔淵稱夫子之善誘亦曰博我以文文果内邪外邪是固無難辨者凡程朱之所為說有戾於此者乎如必以學不資於外求但當反觀内省以為務則正心誠意四字亦何不盡之有何必於入門之際便困以格物一叚工夫也顧經旣有此文理當尊信又不容不有以處之則從而為之訓曰物者意之用也格者正也正其不正以歸於正也其為訓如此要使之内而不外以㑹歸一處亦嘗就以此訓推之如曰意用扵事親即事親之事而格之正其事親之事之不正者以歸於正而必盡夫天理盖猶未及知字已見其繳繞迂曲而難明矣審如所訓兹惟大學之始茍能即事即物正其不正以歸於正而皆盡夫天理則心亦既正矣意亦既誠矣繼此誠意正心之目無乃重複堆疊而無用乎大哉乾元萬物資始至哉坤元萬物資生凡吾之有此身與夫萬物之為萬物孰非出於乾坤其理固皆乾坤之理也自我而觀物固物也以理觀之我亦物也渾然一致而已夫何分於内外乎所貴乎格物者正欲即其分之殊而有見乎理之一無彼無此無欠無餘而實有所統㑹夫然後謂之知至亦即所謂知止而大本於是乎可立達道於是乎可行自誠正以至於治平庶乎可以一以貫之而無遺矣然學者之資稟不齊工夫不等其能格與否或淺或深或遲或速詎容以一言盡哉惟是聖門大學之教其道則無以易此學者所當由之以入不可誣也外此或誇多而鬬靡則溺於外而遺其内或厭繁而喜徑則局於内而遺其外溺於外而遺其内俗學是已局於内而遺其外禪學是已凡為禪學之至者必自以為明心見性然於天人物我未有不二之者是可謂之有真見乎使其見之果真則極天下之至賾而不可惡一毛一髪皆吾體也又安肯叛君父捐妻子以自䧟於禽獸之域哉今欲援俗學之溺而未有以深杜禪學之萌使夫有志於學聖賢者將或昧於所從恐不可不過為之慮也又詳朱子定論之編盖以其中嵗以前所見未真爰及晚年始克有悟乃於其論學書尺三數十卷之内摘此三十餘條其意皆主於向裏者以為得於既悟之餘而斷其為定論斯其所擇宜亦精矣第不知所謂晚年者斷以何年為定羸軀病暑未暇詳考偶考得何叔京氏卒於淳熈乙未時朱子年方四十有六爾後二年丁酉而論孟集註或問始成今有取於答何書者四通以為晚年定論至於集註或問則以為中年未定之說竊恐考之欠詳而立論之太果也又所取答黄直卿一書監本止云此是向來差誤别無定本二字今所編刻増此二字當别有據而序中又變定字為舊字却未詳本字同所指否朱子有答吕東萊一書嘗及定本之說然非指集註或問也凡此愚皆不能無疑顧猶未足深論竊以執事天資絶出而日新不已向來恍若有悟之後自以為證諸五經四子沛然若决江河而放諸海又以為精明的確洞然無復可疑某固信其非虚語也然又以為獨於朱子之說有相牴牾揆之於理容有是邪他說姑未敢請嘗讀朱子文集其第三十二卷皆與張南軒答問書内第四書亦自以為其於實體似益精明因復取凡聖賢之書以及近世諸老先生之遺語讀而騐之則又無一不合盖平日所疑而未白者今皆不待安排徃徃自見灑落處與執事之所以自序者無一語不相似也書中發其所見不為不明而卷末一書提綱振領尤為詳盡竊以為千聖相傳之心學殆無以出此矣不知何故獨不為執事所取無亦偶然也邪若以此二書為然則論孟集註學庸章句或問不容别有一般道理雖或其間小有出入自不妨隨處明辨也如其以為未合則是執事精明之見决與朱子異矣凡此三十餘條者不過姑取之以證成髙論而所謂先得我心之所同然者安知不有毫釐之不同者為祟於其間以成牴牾之大隙哉恐不可不詳推其所以然也又執事於朱子之後特推草廬呉氏以為見之尤真而取其一說以附於三十餘條之後竊以草廬晚年所見端的與否良未易知盖吾儒昭昭之云釋氏亦毎言之毫釐之差正在於此即草廬所見果有合於吾之所謂昭昭者安知非其四十年間鑚研文義之效殆所謂真積力久而豁然貫通者也盖雖以明道先生之髙明純粹又早獲親炙於濓溪以發其吟風弄月之趣亦必反求諸六經而後得之但其所稟隣於生知聞一以知十與他人極力於鑚研者不同耳又安得以前日之鑚研文義為非而以墮此科臼為悔夫得魚忘筌得兎忘蹄可也矜魚兎之獲而反追咎筌蹄以為多事其可乎哉然世之徒事鑚研而不知反說約者則不可不深有儆於斯言也抑草廬既有見夫所謂昭昭者又以不使有須臾之間斷為庶㡬乎尊之之道其亦然矣而下文乃云於此有未能則問於人學於已而必欲其至夫其須臾之間間斷與否豈他人之所能與且既知所以尊之之道在此一有間斷則繼續之而已又安得以為未能而别有所謂學哉是則見道固難而體道尤難道誠未易明而學誠不可不講恐未可安於所見而遂以為極則也某非知道者然黽勉以求之亦有年矣駸尋衰晚茫無所得乃欲與一代之英論學多見其不知量也雖然執事平日相與之意良不薄矣雖則駑鈍心誠感慕而樂求教焉一得之愚用悉陳之而不敢隱其他節目所欲言者頗多筆硯久踈收拾不上然其大要亦畧可覩矣伏惟經畧之暇試一觀焉還賜一言以决其可否幸甚又戊子冬側聞旌麾伊邇計不日當臨弊邑甚欲一瞻徳範以慰多年渇仰之懐柰病骨支離艱於逺出咫尺千里悵惘曷勝伏惟亮察去年嘗辱手書預訂文㑹殆有意乎左提右挈相與偕之大道為愛良厚感戢無已但無若區區之固滯何夫固滯者未免於循常而髙明者恒妙於獨得竊恐異同之論有非一㑹晤間之所能决也然病既有妨盛意何可虚辱輙以近來鄙說數叚奉呈尊覽及嘗反覆髙論有不能無疑者亦條為一叚具如别幅固知未能仰契尊㫖將不免為覆瓿之具亦姑效其愚而已雖然愚者千慮容有一得先暌後合尚不能無望於髙明伏希裁擇幸甚物者意之用也格者正也正其不正以歸於正也此執事格物之訓也向䝉惠教有云格物者格其心之物也格其意之物也格其知之物也正心者正其物之心也誠意者誠其物之意也致知者致其物之知也自有大學以來無此議論此髙明獨得之妙夫豈淺陋之所能窺也邪然誨諭之勤兩端既竭固嘗反覆推尋不敢忽也夫謂格其心之物格其意之物格其知之物凡其為物也三謂正其物之心誠其物之意致其物之知其為物也一而已矣就三物而論以程子格物之訓推之猶可通也以執事格物之訓推之不可通也就一物而論則所謂物者果何物邪如必以為意之用雖極安排之巧終無可通之日此愚之所不能無疑者一也又執事嘗謂意在於事親即事親是一物意在於事君即事君是一物諸如此類不妨說得行矣有如論語川上之嘆中庸鳶飛魚躍之㫖皆聖賢喫𦂳為人處學者如未能深達其義未可謂之知學也試以吾意著於川之流鳶之飛魚之躍若之何正其不正以歸於正邪此愚之所不能無疑者二也又執事答人論學書有云吾心之良知即所謂天理也致吾心良知之天理於事事物物則事事物物皆得其理矣致吾心之良知者致知也事事物物各得其理者格物也審如所言則大學當云格物在致知不當云致知在格物當云知至而后物格不當云物格而后知至矣且既言精察此心之天理以致其本然之良知又言正惟致其良知以精察此心之天理然則天理也良知也果一乎果非一乎察也致也果孰先乎孰後乎此愚之所不能無疑者三也初作此書將以復陽明徃年講學之約書未及寄而陽明下世矣惜哉鄙說數叚皆記中語也念非一家私議因録之答允恕弟己丑夏昨得手簡知嘗細讀拙記心性理氣諸說凡記中大節目吾弟所見皆合何慰如之然心性之辨既明則象山之學術居然可見顧乃疑吾言為已甚何也象山之學吾見得分明是禪弟則以為似襌似之為言彷佛之謂也以余觀之佛氏有見於心無見於性象山亦然其所謂至道皆不出乎靈覺之妙初不見其有少異也豈直彷彿云乎據象山所見自不合攻禪縁當時多以禪學目之不容不自解爾釋氏之自私自利固與吾儒不同然此只是就形迹上斷他病根所在不曽說得盖以靈覺為至道乃其病根所以異於吾儒者實在於此而此二字正是象山受用處如何自肯拈出余所謂陽避其名而隂用其實誠有見乎此也格物之義程朱之訓明且盡矣當為萬物無疑人之有心固然亦是一物然專以格物為格此心則不可說卦傳曰觀變於隂陽而立卦發揮於剛柔而生爻和順於道徳而理於義窮理盡性以至於命後兩句皆主卦爻而言窮理云者即卦爻而窮之也盖一卦有一卦之理一爻有一爻之理皆所當窮窮到極處却止是一理此理在人則謂之性在天則謂之命心也者人之神明而理之存主處也豈可謂心即理而以窮理為窮此心哉良心發見乃感應自然之機所謂天下之至神者固無待於思也然欲其一一中節非思不可研㡬工夫正在此處故大學之教雖已知止有定必慮而後能得之其工夫之詳宻可知矣若此心粗立猶未及於知止感應之際乃一切任其自然遂以為即此是道其不至於猖狂妄行者㡬希凡象山之為此言誤人多矣其流禍迄今益甚士之好髙欲速者更倡迭和駸駸乎有丕變於夷之勢世道升降將必由之余惟恐攻之之不力而無以塞其源殊不覺其言之已甚也來簡有云若陽避隂用則象山乃反覆作偽之人此固君子之言而亦可謂善辨矣余敢忽哉夫以象山之髙明固宜不肯作偽但其見性不的而主張所學太過未免頗有飾辭如辨無極書中一隂一陽已是形而上者况太極乎兩語明是疎脫却湏要遮飾又如答李敏求心性材情之問始終不見分曉只是支吾恐非所謂修辭立其誠也弟嘗徧讀其書試尋得㡬句言性分明處來安有不服陽避隂用之說當不俟終日而改之矣趙東山之賛要在超然獨契本心一語意欲為象山出脫禪學余固謂象山有見於心但無見於性爾賛詞得無尚費分說邪湛元明議論多持兩端余嘗儗之楊子雲矣况渠乃象山𣲖下真法嗣乎容有囘䕶言及於此弟將又以為甚顧不直則道不見爾倘猶未合不妨更熟講之余固嘗言辨之弗明而弗措焉必有時而明矣附允恕原簡承示劄記反覆數過詞意俱到心性理氣諸說鄙見皆同獨象山條下終未盡合心性雖㣲有分原只一理象山想是合下心地清明故所見過髙不再細究遂謂心即理也又云格此物窮此理此字皆指心言人誠能窮得此心之理亦何性不了記云聖經格物窮理果指心乎然則物理果皆非心乎當惻隱處自惻隱等語此良心發見處恐亦無待乎思又與王順伯書言儒者以人生與天理並而為三極不盡人道不足與天地並釋氏止見生死事大此即其道之有異爾後一書尤懇切若謂陽避其名而隂用其實則象山乃反覆作偽之小人非惟朱子得以攻之順伯老兄亦將攘臂而敺之矣隂實祖用其說而陽諱其所自來此亦朱之攻陸未知能得其服辨否與順百書朱子亦議其不是今不及撿閱嘗愛趙東山之賛及近日湛元明之語云謂之禪吾不敢也謂流而非禪吾不信也可謂平正之論兄再思之記得無已甚乎無令後人之議今也今專此申請便中示正病暑不能詳悉答黄筠谿亞卿道心性也性者道之體人心情也情者道之用其體一而已矣用則有千變萬化之殊然而莫非道也此理甚明此說從來不易來書乃有用非道乎之難殊莫詳所以反覆思之得非人心道心之辨有未合乎夫危㣲精一四語乃心學之源僕於此煞曾下工夫體究來直窮到無可窮處方敢立論萬一未合願相與熟講之此處合則無徃而不合矣寂然不動感而遂通髙見謂非聖人不能是以不能無疑於鄙說愚則以謂常人之心亦有時而寂但茫無主宰而大本有所不立常人之心亦無時不感但應物多謬而達道有所不行此其所以善惡雜出而常危也此亦不須執紙上言語騐之於心便自可見既是人心動静如此即不容獨歸之聖人矣請更詳之静無形而動有象只是就已發未發上立論非謂人倫庶物皆不必留意也盖格物窮理工夫記中第六第七章嘗推明程子之意其說亦既詳矣試求其下手處惟性情最為切近故此章粗舉其端至第二十一章方能盡其說也果於性情上有見則天下之理皆不外此然亦須於事物上一一騐過或先於事物有見亦須就性情上騐過盖内外只是一理但有纎毫不合便成窒礙所見終未為的也且吾心之理與人倫庶物之理皆所謂無聲無臭者也既曰窮理孰非明其所難明者乎知行嘗並進而知常在先先儒有定論矣南軒之說未見全文所謂知有淺深理固如此陽明學術大本已自不同其餘要不足深辨知萬物同出一理為知至此言未為不是但不知吕氏於格物處若何用工乃自為四說之異據其所說與同出一理之言自不相應朱子以牽合二字㫁之可謂切中其病矣余所云物格則無物者誠以工深力到而豁然貫通則凡屈伸消長之變始終聚散之狀哀樂好惡之情雖千緒萬端而卓然心目間者無非此理一切形噐之粗迹舉不能礙吾廓然之本體夫是之謂無物孟子所謂盡心知性而知天即斯義也天人物我其理本一不容私意安排若有意於合物我而一之即是牽合之私非自然之謂矣勉强牽合此處或通他處復礙何由得到盡心地位邪來書所舉無物之句格字在物字上恐一時筆誤也六十五章重添註脚之煩誠如來諭但於理一分殊之義似乎稍有發明不知觀者縁何反惑繼之者善即所謂感於物而動直縁程子之意而申明之耳非以化育形容人心也盖程子繼善之云是就人性發用處說感物而動正是人性發用處也以感動釋繼善程子本意較似分明似亦無可疑者惟濁其感動之物欲以下三語原本倒却正意後嘗改正所以致惑或恐在此更希指示也指擿之諭盛徳之言也感佩感佩初間遇有所見即記之於册似此類多矣及冩净本亦頗自覺傷直多已削之所未果盡削者誠慮道之不見也然直有餘而禮不足僕誠過矣將何以補之乎答歐陽少司成甲午秋得六月望日書披閱再四承不以老朽見棄為之欣然傾倒多至累幅厚意何可當夫道之不明久矣所幸聖賢之遺書尚存有志於學者誦其言而咀其味探其歸趣反而騐之吾心庶或窺見其一二以為持循之地顧有道之君子世不多得是非得失莫或正之其所取證終亦不出乎聖賢之書而已僕之從事於此盖亦有年齒髪既凋自度無能復進乃筆其區區之見以與朋友講之然視為老生常談一覽而遂置之者多矣異同之論邈乎其未有聞頃辱貽書見需拙稿夙欽髙誼因輙以奉寄意者將有合焉誨札遄來則枘方鑿圓殊不相入髙見已定殆亦無復可言者矣而書詞丁寧不容自己勉罄所聞以復請更詳之來書凡三叚第一叚申明良知即天理之說甚悉首云知覺與良知名同而實異末云考之孔曾思孟濓溪明道之言質之楞伽楞嚴圓覺涅槃諸經其宗㫖異同頗覺判别足知賢契不肯以襌學自居也然人之知識不容有二孟子本意但以不慮而知者名之曰良非謂别有一知也今以知惻隱知羞惡知恭敬知是非為良知知視知聽知言知動為知覺是果有二知乎夫人之視聽言動不待思慮而知者亦多矣感通之妙捷於桴鼔何以異於惻隱羞惡恭敬是非之發乎且四端之發未有不闗於視聽言動者是非必自其口出恭敬必形於容貌惡惡臭輙掩其鼻見孺子將入於井輒匍匐而徃救之果何從而見其異乎知惟一爾而强生分别吾聖賢之書未嘗有也惟楞伽有所謂真識現識及分别事識三種之别必如髙論則良知乃真識而知覺當為分别事識無疑矣夫不以襌學自居志之正也而所以自解者終不免墮於其說無乃未之思乎天性之真明覺自然隨感而通自有條理是以謂之良知亦謂之天理僕雖耄固知賢契所得在此數語然其誤處亦在此數語此正是講學切要處不得無言第恐定力難移言之苦無益爾雖然吾心其可以不盡乎夫謂良知即天理則天性明覺只是一事區區之見要不免於二之盖天性之真乃其本體明覺自然乃其妙用天性正於受生之初明覺發於既生之後有體必有用而用不可以為體也此非僕之臆說其在樂記則所謂人生而静天之性即天性之真也感物而動性之欲即明覺之自然也在易大傳則所謂天下之至精即天性之真也天下之至神即明覺之自然也在詩大雅則所謂有物有則即天性之真也好是懿徳即明覺之自然也諸如此類其證甚明曾有一言謂良知為天理者乎然孔曾思孟濓溪明道之言賢契嘗考之矣或恐别有可證髙論者惜乎畧未舉及僕請再以所聞於數子者證之孔子嘗言知道知徳矣曾子嘗言知止矣子思嘗言知天知人矣孟子嘗言知性知天矣凡知字皆虚下一字皆實虚實既判體用自明以用為體未之前聞也况明道先生嘗釋知覺二字之義云知是知此事覺是覺此理尤為明白易見上下千數百年其言如出一口吾輩但當䔍信而固守之豈容立異若前無所受而欲自我作古徒滋後學之惑而已非惟不足以明道且將獲罪於聖門可不慎乎且僕又嘗聞之伊川之道與明道無異晦菴之學以二程為宗來書所舉竟不及二先生何也得無以其格物之訓於良知之說有礙乎夫天人物我其理無二來書格物工夫惟是隨其位分修其日履雖云與佛氏異然於天地萬物之理一切置之度外更不復講則無以達夫一貫之妙又安能盡已之性以盡人物之性賛化育而叅天地哉此無他只縁誤認良知為天理於天地萬物上良知二字自是安著不得不容不置之度外爾聖人本天釋氏本心天地萬物之理既皆置之度外其所本從可知矣若非隨其位分修其日履則自頂至踵寜復少有分别乎二先生所見之理洞徹無間凡其格物之訓誠有所謂百世以俟聖人而不惑者其孰能易之世儒妄加詆訾以自䧟於浮薄諒賢契之所不取然於二先生之學似宜更加之意不以所見偶未之合而遂置之斯文之幸也第二叚所論學問思辨工夫與僕所聞亦無甚異但本領既别則雖同此進為之方先後緩急自有不可得而同者盖以良知為天理則易簡在先工夫居後後則可緩陳白沙所謂得此欛柄入手更有何事自兹以徃但有分殊處合要理㑹是也謂天理非良知則易簡居後工夫在先先則當急中庸所謂果能此道矣雖愚必明雖柔必强是也此說頗長姑舉其槩以賢契之明悟宜亦不待余詞之畢也聖賢經書人心善惡是非之迹固無不紀然其大要無非發明天理以垂訓萬世世之學者既不得聖賢以為之師始之開發聰明終之磨礲入細所賴者經書而已舍是則貿貿焉莫知所之若師心自用有能免於千里之謬者鮮矣善讀書者莫非切已工深力到内外自然合一易簡之妙於是乎存岐而二之不善讀書者也夫天下之士亦多矣豈可謂凡讀書者皆逺人以為道惟尊奉其良知以從事於易簡者乃為不逺人以為道乎第三叚所論教學本原與夫後世學術之弊亦可謂句句合矣但㣲意所在乃專以尊奉良知從事於易簡者為是窮究物理博通於典訓者為非只縁本領不同故其去取若是夫孔孟之絶學至二程兄弟始明二程未嘗認良知為天理也以謂有物必有則故學必先於格物今以良知為天理乃欲致吾心之良知於事事物物此語見傳習録來書亦云致其良知於日履之間以達之天下則是道理全在人安排出事物無復本然之則矣無乃不得於言乎雍語亦云天理只是吾心本體豈可於事物上尋討總是此見不得於言而勿求諸心此是告子大病凡為孔孟之學者或偶霑斯疾不早進暝眩之藥以除其根是無勇也古者大學之教非秀民不預農賈罝兎誠有所不能及者故曰民可使由之不可使知之公侯腹心天資之忠厚者亦云可矣豈真見而知之與太公望散宜生等乎古人自㓜而學至四十始仕三十年間無非為學之日既專且久道明而徳立及為公卿大夫直行其所學而已不暇為學又奚病焉來書不能及不暇為之說殆以廣招徠之路使人競趨於易簡爾豈通論乎格致與博物洽聞不同先儒已自說破彼徒博而不知反諸約者望其入道誠亦難矣若夫講之精辯之悉知之明而學之果不差焉斯固吾夫子之所謂好學者豈易得哉學既不差安有源逺本披之患本披源逺皆差之毫釐而不自覺者也嗟乎安得先覺之君子特起於今之世以盡覺夫未覺者哉累幅之書中間儘有合商量處第年老精神短照管不及又恐亂却正意是以但即其切要者論之然體用兩字果明則凡未經商量者雖欲不歸於一不可得也未審髙見畢竟以為何如言有盡而意無窮千萬詳察又二月十一日得去年十月晦日所惠書徃復間不覺遂半年矣披覽之既欣慰可知僕獨學無朋見聞甚少向來奉復誠欲資麗澤之益故詞繁而不殺兹承逐條開剥俾得聞所未聞幸甚幸甚夫良知之說賢契講之久矣其義皆先儒所未及僕之所守不過先儒成說其不合也固宜詳味來書詞雖若謙而所執彌固固以凝道謙以全交可謂兩得之矣老拙於此尚何言哉然而瓊玖之投木𤓰之報又禮之所不容廢者敬就來書再舉一二以見枘鑿之不相入處刓方為圓老拙固所不能斵圓就方賢契亦或未肯姑以奉酬雅意焉爾來書謂立言各有所當此語固然樂記亦云物至知知不妨自為體用也但以理言即恐良知難作實體㸔果認為實體即與道徳性天字無異若曰知此良知是成何等說話邪明道學者須先識仁一章首尾甚是分明未嘗指良知為實體也首云仁者渾然與物同體義禮智信皆仁也識得此理以誠敬存之而已中間又云訂頑意思乃備言此體以此意存之更有何事初未嘗語及良知已自分明指出實體了不然則所謂存之者果何物邪且訂頑之書具存並無一言與良知畧相似者此理殆不難見也其良知良能以下數語乃申言存得便合有得之意盖雖識得此理若欠却存飬工夫則猶是二物有對以已合彼終未有之惟是存養深厚自然良知日明良能日充舊習日消此理與心漸次打成一片便為已有夫是之謂有得其語脉一一可尋也此章之言陳白沙嘗喫𦂳拈出近時有志於學者率喜談之然非虚心潛玩毫釐之差或未能免無乃上累先賢已乎又來書力辨置之度外一言僕固知此言之逆耳然竊有所見非敢厚誣君子也嘗讀文言有云大哉乾乎剛徤中正純粹精也此天理之本然也象傳有云乾道變化各正性命此天理之在萬物者也吾夫子賛易明言天地萬物之理以示人故有志於學者須就天地萬物上講求其理若何謂之純粹精若何謂之各正人固萬物中之一物爾須灼然見得此理之在天地者與其在人心者無二在人心者與其在鳥獸草木金石者無二在鳥獸草木金石者與其在天地者無二方可謂之物格知至方可謂之知性知天不然只是揣摩臆度而已盖此理在天地則宰天地在萬物則宰萬物在吾心則宰吾身其分固森然萬殊然止是一理皆所謂純粹精也以其分之殊故天之所為有非人所能為者人之所為有非物所能為者以其理之一故能致中和則天地以位萬物以育中即純粹精之隱於人心者也和即純粹精之顯於人事者也自源徂流明如指掌故曰聖人本天僕之所聞盖如此今以良知為天理即不知天地萬物皆有此良知否乎天之髙也未易驟窺山河大地吾未見其有良知也萬物衆多未易徧舉草木金石吾未見其有良知也求其良知而不得安得不置之度外邪殊不知萬物之所得以為性者無非純粹精之理雖頑然無知之物而此理無一不具不然即不得謂之各正即是天地間有無性之物矣以此觀之良知之非天理豈不明甚矣乎來書所云視聽思慮必交於天地萬物無有一處安着不得而置之度外者只是認取此心之靈感通之妙原不曾透到萬物各正處未免昏却理字終無以自别於弄精魂者爾頗記佛書有云佛身充滿於法界普見一切羣生前隨縁赴感靡不周而恒處此菩提座非所謂視聽思慮必交於天地萬物者邪此之暌而彼之合無他良由純粹精之未易識不肯虚心易氣以求之爾率意盡言似乎傷直然非以求勝也盖講論道理自不容於不盡是非取舍則在明者擇焉倘猶未亮姑置之可也因風時寄數字以慰岑寂足見久要之義鄉書已祇受珍感珍感不宣困知記附録
