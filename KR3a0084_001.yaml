body:
  text: 困知記卷上明羅欽順撰凡八十一章孔子教人莫非存心養性之事然未嘗明言之也孟子則明言之矣夫心者人之神明性者人之生理理之所在謂之心心之所有謂之性不可混而為一也虞書曰人心惟危道心惟微論語曰從心所欲不踰矩又曰其心三月不違仁孟子曰君子所性仁義禮智根於心此心性之辨也二者初不相離而實不容相混精之又精乃見其真其或認心以為性真所謂差毫釐而謬千里者矣繫辭傳曰無有逺近幽深遂知來物非天下之至精其孰能與於此通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此寂然不動感而遂通天下之故非天下之至神其孰能與於此夫易聖人之所以極深而研幾也易道則然即天道也其在人也容有二乎是故至精者性也至變者情也至神者心也所貴乎存心者固將極其深研其幾以無失乎性情之正也若徒有見乎至神者遂以為道在是矣而深之不能極而幾之不能研顧欲通天下之志成天下之務有是理哉道心寂然不動者也至精之體不可見故微人心感而遂通者也至變之用不可測故危道心性也人心情也心一也而兩言之者動靜之分體用之别也凡靜以制動則吉動而迷復則凶惟精所以審其幾也惟一所以存其誠也允執厥中從心所欲不踰矩也聖神之能事也釋氏之明心見性與吾儒之盡心知性相似而實不同蓋虛靈知覺心之妙也精微純一性之真也釋氏之學大抵有見於心無見於性故其為教始則欲人盡離諸相而求其所謂空空即虛也既則欲其即相即空而契其所謂覺即知覺也覺性既得則空相洞徹神用無方神即靈也凡釋氏之言性窮其本末要不出此三者然此三者皆心之妙而豈性之謂哉使其據所見之境復能向上尋之帝降之衷亦庶乎其可識矣顧自以為無上妙道曾不知其終身尚有尋不到處乃敢遂駕其説以誤天下後世之人至於廢棄人倫滅絶天理其貽禍之酷可勝道哉夫攻異端闢邪説孔氏之家法也或乃陽離隂合貌詆心從以熒惑多士號為孔氏之徒誰則信之盈天地之間者惟萬物人固萬物中一物爾乾道變化各正性命人猶物也我猶人也其理容有二哉然形質既具則其分不能不殊分殊故各私其身理一故皆偹於我夫人心虛靈之體本無不該惟其蔽於有我之私是以明於近而暗於逺見其小而遺其大凡其所遺所暗皆不誠之本也然則知有未至欲意之誠其可得乎故大學之教必始於格物所以開其蔽也格物之訓如程子九條往往互相發明其言譬如千蹊萬徑皆可以適國但得一道而入則可以推類而通其餘為人之意尤為深切而今之學者動以不能盡格天下之物為疑是豈嘗一日實用其工徒自誣耳且如論語川上之嘆中庸鳶飛魚躍之旨孟子犬牛人性之辨莫非物也於此精思而有得焉則凡偹於我者有不可得而盡通乎又如中庸言大哉聖人之道洋洋乎發育萬物峻極於天優優大哉禮儀三百威儀三千待其人而後行夫三百三千莫非人事聖人之道固於是乎在矣至於發育萬物自是造化之功用而以之言聖人之道何邪其人又若何而行之邪於此精思而有得焉天人物我內外本末幽明之故死生之説鬼神之情狀皆當一以貫之而無遺矣然則所謂萬物者果性外之物也邪格物莫若察之於身其得之尤切程子有是言矣至其答門人之問則又以為求之情性固切於身然一草一木亦皆有理不可不察蓋方是時禪學盛行學者往往溺於明心見性之説其於天地萬物之理不復置思故常陷於一偏蔽於一已而終不可與入堯舜之道二程切有憂之於是表章大學之書發明格物之旨欲令學者物我兼照內外俱融彼此交盡正所以深救其失而納之於大中良工苦心知之者誠亦鮮矣夫此理之在天下由一以之萬初匪安排之力會萬而歸一豈容牽合之私是故察之於身宜莫先於性情即有見焉推之於物而不通非至理也察之於物固無分於鳥獸草木即有見焉反之於心而不合非至理也必灼然有見乎一致之妙了無彼此之殊而其分之殊者自森然其不可亂斯為格致之極功然非真積力久何以及此幽明之故死生之説鬼神之情狀未有物格知至而不能通乎此者也佛氏以山河大地為幻以生死為輪回以天堂地獄為報應是其知之所未徹者亦多矣安在其為見性世顧有尊用格此物致此知之緒論以隂售其明心之説者是成何等見識邪佛氏之幸吾聖門之不幸也此理誠至易誠至簡然易簡而天下之理得乃成德之事若夫學者之事則博學審問愼思明辨篤行廢一不可循此五者以進所以求至於易簡也茍厭夫問學之煩而欲徑逹於易簡之域是豈所謂易簡者哉大抵好髙欲速學者之通患為此説者適有以投其所好中其所欲人之靡然從之無怪乎其然也然其為斯道之害甚矣可懼也夫格字古注或訓為至如格于上下之類或訓為正如格其非心之類格物之格二程皆以至字訓之因文生義惟其當而已矣吕東萊釋天夀平格之格又以為通徹三極而無間愚按通徹無間亦至字之義然比之至字其意味尤為明白而深長試以訓格于上下曰通徹上下而無間其孰曰不然格物之格正是通徹無間之意蓋工夫至到則通徹無間物即我我即物渾然一致雖合字亦不必用矣自夫子贊易始以窮理為言理果何物也哉蓋通天地亘古今無非一氣而已氣本一也而一動一靜一往一來一闔一闢一升一降循環無已積微而著由著復微為四時之溫涼寒暑為萬物之生長收藏為斯民之日用彛倫為人事之成敗得失千條萬緒紛紜膠轕而卒不可亂有莫知其所以然而然是即所謂理也初非别有一物依於氣而立附於氣以行也或者因易有太極一言乃疑隂陽之變易類有一物主宰乎其間者是不然夫易乃兩儀四象八卦之總名太極則衆理之總名也云易有太極明萬殊之原於一本也因而推其生生之序明一本之散為萬殊也斯固自然之機不宰之宰夫豈可以形迹求哉斯義也惟程伯子言之最精叔子與朱子似乎小有未合今其説具在必求所以歸於至一斯可矣程伯子嘗歷舉繫辭形而上者謂之道形而下者謂之器立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義一隂一陽之謂道數語乃從而申之曰隂陽亦形而下者也而曰道者惟此語截得上下最分明元來只此是道要在人默而識之也學者試以此言潛玩精思久久自當有見所謂叔子小有未合者劉元承記其語有云所以隂陽者道又云所以闔闢者道竊詳所以二字固指言形而上者然未免微有二物之嫌以伯子元來只此是道之語觀之自見渾然之妙似不須更著所以字也所謂朱子小有未合者蓋其言有云理與氣決是二物又云氣強理弱又云若無此氣則此理如何頓放似此類頗多惟答柯國材一書有云一隂一陽往來不息即是道之全體此語最為直截深有合於程伯子之言然不多見不知竟以何者為定論也朱子年十五六即有志於道求之釋氏者幾十年及年二十有四始得延平李先生而師事之於是大悟禪學之非而盡棄其舊習延平既卒又得南軒張子而定交焉誠有麗澤之益者也延平嘗與其友羅博文書云元晦初從謙開善處下工夫來故皆就裏面體認今既論難見儒者路脈極能指其差誤之處自見羅先生來未見有如此者又云此子别無他事一味潛心於此今漸能融釋於日用處一意下工夫若於此漸熟則體用合矣觀乎此書可以見朱子入道端的其與南軒往復論辨書尺不勝其多觀其論中和最後一書發明心學之妙殆無餘藴又可見其所造之深也誠明兩進著述亦富當時從遊之士後世私淑之徒纍百千人未必皆在今人之下然莫不心悅而誠服之是豈可以聲音笑貌為哉今之學者概未嘗深考其本末但粗讀陸象山遺書數過輒隨聲逐響橫加詆訾徒自見其陋也已矣於朱子乎何傷謙開善當是髙僧然未及考自昔有志於道學者罔不尊信程朱近時以道學鳴者則泰然自處於程朱之上矣然考其所得乃程朱早嘗學焉而竟棄之者也夫勤一生以求道乃拾先賢所棄以自珍反從而議其後不亦誤耶雖然程朱之學可謂至矣然其心則固未嘗自以為至也何以明之程叔子易傳已成學者莫得傳授或以為請則曰自量精力未衰尚覬有少進爾朱子年垂七十有於上面猶隔一膜之嘆蓋誠有見乎義理之無窮於心容有所未慊者非謙辭也愚嘗遍取程朱之書潛玩精思反覆不置惟於伯子之説了無所疑叔子與朱子論著答問不為不多往往窮深極微兩端皆竭所可疑者獨未見其定於一爾豈其所謂猶隔一膜者乎夫因其言而求其所未一非篤於尊信者不能此愚所以盡心焉而不敢忽也六經之中言心自帝舜始言性自成湯始舜之四言未嘗及性性固在其中矣至湯始明言之曰惟皇上帝降衷於下民若有恆性克綏厥猷惟后孔子言之加詳曰一隂一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣又曰性相近子思述之則曰天命之謂性率性之謂道孟子祖之則曰性善凡古聖賢之言性不過如此自告子而下初無灼然之見類皆想像以為言其言益多其合於聖賢者殊寡卒未有能定於一者及宋程張朱子出始别白而言之孰為天命之性孰為氣質之性參之孔孟驗之人情其説於是乎大備矣然一性而兩名雖曰二之則不是而一之又未能也學者之惑終莫之解則紛紛之論至今不絶於天下亦奚怪哉愚嘗寤寐以求之沉潛以體之積以歲年一旦恍然似有以洞見其本末者竊以性命之妙無出理一分殊四字簡而盡約而無所不通初不假於牽合安排自確乎其不可易也蓋人物之生受氣之初其理惟一成形之後其分則殊其分之殊莫非自然之理其理之一常在分殊之中此所以為性命之妙也語其一故人皆可以為堯舜語其殊故上智與下愚不移聖人復起其必有取於吾言矣所謂約而無所不通者請以從古以來凡言性者明之若有恆性理之一也堯綏厥猷則分之殊者隱然寓乎其間成之者性理之一也仁者知者百姓也相近也者分之殊也天命之謂性理之一也率性之謂道分之殊也此别有説在後性善理之一也而其言未及乎分殊有性善有性不善分之殊也而其言未及乎理一程張本思孟以言性既專主乎理復推氣質之説則分之殊者誠亦盡之但曰天命之性固已就氣質而言之矣曰氣質之性性非天命之謂乎一性而兩名且以氣質與天命對言語終未瑩朱子尤恐人之視為二物也乃曰氣質之性即太極全體墮在氣質之中夫既以墮言理氣不容無罅縫矣惟以理一分殊蔽之自無往而不通而所謂天下無性外之物豈不亶其然乎至理之源不出乎動靜兩端而已靜則一動則萬殊在天在人一也樂記曰人生而靜天之性也感於物而動性之欲也中庸曰喜怒哀樂之未發謂之中發而皆中節謂之和此理之在人也不於動靜求之將何從而有見哉然靜無形而動有象有象者易識無形者難明所貴乎窮理者正欲明其所難明爾夫未發之中即帝降之衷即所受天地之中以生者夫安有不善哉惟是喜怒哀樂之發未必皆中乎節此善惡之所以分也節也者理一之在分殊中也中節即無失乎天命之本然何善如之或過焉或不及焉猶有所謂善者存焉未可遽謂之惡也必反之然後為惡反之云者好人之所惡惡人之所好也所以善惡之相去或相倍蓰或相十百或相千萬兹不謂之萬殊而何然欲動情勝雖或流而忘反而中之本體固自若也初未始須臾離也不明乎此而曰我知性非妄歟樂記所言欲與好惡與中庸喜怒哀樂同謂之七情其理皆根於性者也七情之中欲較重蓋惟天生民有欲順之則喜逆之則怒得之則樂失之則哀故樂記獨以性之欲為言欲未可謂之惡其為善為惡係於有節與無節爾天人一理而其分不同人生而靜此理固在於人分則屬乎天也感物而動此理固出乎天分則屬乎人矣君子必愼其獨其以此夫理一分殊四字本程子論西銘之言其言至簡而推之天下之理無所不盡在天固然在人亦然在物亦然在一身則然在一家亦然在天下亦然在一歲則然在一日亦然在萬古亦然持此以論性自不須立天命氣質之兩名粲然其如視諸掌矣但伊川既有此言又以為才稟於氣豈其所謂分之殊者專指氣而言之乎朱子嘗因學者問理與氣亦稱伊川此語説得好却終以理氣為二物愚所疑未定於一者正指此也天命之謂性自其受氣之初言也率性之謂道自其成形之後言也蓋形質既成人則率其人之性而為人之道物則率其物之性而為物之道鈞是人也而道又不盡同仁者見之則謂之仁知者見之則謂之知百姓則日用而不知分之殊也於此可見所云君子之道鮮矣者蓋君子之道乃中節之和天下之逹道也必從事於修道之教然後君子之道可得而性以全戒懼愼獨所以修道也喜怒哀樂之未發謂之中子思此言所以開示後學最為深切蓋天命之性無形象可覩無方體可求學者猝難理會故即喜怒哀樂以明之夫喜怒哀樂人人所有而易見者但不知其所謂中不知其為天下之大本故特指以示人使知性命即此而在也上文戒愼恐懼即所以存養乎此然知之未至則所養不能無差或陷於釋氏之空寂矣故李延平教人須於靜中體認大本未發時氣象分明即處事應物自然中節李之此指蓋得之羅豫章羅得之楊龜山楊乃程門髙第其固有自來矣程伯子嘗言學者先須識仁識得此理以誠敬存之而已叔子亦言勿忘勿助長只是養氣之法如不識怎生養有物始言養無物又養箇甚由是觀之則未發之中安可無體認工夫雖叔子嘗言存養於未發之時則可求中於未發之前則不可此殆一時答問之語未必其終身之定論也且以為既思即是已發語亦傷重思乃動靜之交與發於外者不同推尋體認要不出方寸間爾伯子嘗言天理二字是自家體貼出來又云中者天下之大本天地之間亭亭當當直上直下之正理出則不是若非其潛心體貼何以見得如此分明學者於未發之中誠有體認工夫灼見其直上直下真如一物之在吾目斯可謂之知性也已亹亹焉戒懼以終之庶無負子思子所以垂教之深意乎存養是學者終身事但知既至與知未至時意味逈然不同知未至時存養非十分用意不可安排把捉靜定為難往往久而易厭知既至存養即不須大假著力從容㴠泳之中生意油然自有不可遏者其味深且長矣然為學之初非有平日存養之功心官不曠則知亦無由而至朱子所謂誠明兩進者以此省察是將動時更加之意即大學所謂安而慮者然安而能慮乃知止後事故所得者深若尋常致察其所得者終未可同日而語大抵存養是君主省察乃輔佐也孟子以勿忘勿助長為養氣之法氣與性一物但有形而上下之分爾養性即養氣養氣即養性顧所從言之不同然更無别法子思所謂戒愼恐懼似乎勿忘之意多孟子語意較完也格物致知學之始也克已復禮學之終也道本人所固有而人不能體之為一者蓋物我相形則惟知有我而已有我之私日勝於是乎違道日逺物格則無物惟理之是見已克則無我惟理之是由沛然天理之流行此其所以為仁也始終條理自不容紊故曰知至至之知終終之知及之而行不逮蓋有之矣茍未嘗真知禮之為禮有能不逺而復者不亦鮮乎顔子克已復禮殊未易言蓋其於所謂禮者見得已極分明所謂如有所立卓爾也惟是有我之私猶有纎毫消融未盡消融盡即渾然與理為一矣然此處工夫最難蓋大可為也化不可為也若吾徒之天資學力去此良逺但能如謝上蔡所言從性偏難克處克將去即是日用間切實工夫士希賢賢希聖固自有次第也顔子之猶有我於願無伐善無施勞見之天地之化人物之生典禮之彰鬼神之祕古今之運死生之變吉凶悔吝之應其説殆不可勝窮一言以蔽之曰一隂一陽之謂道上天之載無聲無臭不出乎人心動靜之際人倫日用之間詩所謂昊天曰明及爾出王昊天曰旦及爾遊衍即其義也君子敬而無失事天之道庶乎盡之若夫聖人純亦不已則固與天為一矣仁至難言孔子之答問仁皆止言其用力之方孟子亦未嘗明言其義其曰仁人心也蓋即此以明彼見其甚切於人而不可失爾與下文人路之義同故李延平謂孟子不是將心訓仁其見卓矣然學者類莫之察往往遂失其旨歷選諸儒先之訓惟程伯子所謂渾然與物同體似為盡之且以為義禮智信皆仁則粲然之分無一不具惟其無一不具故徹頭徹尾莫非是物此其所以為渾然也張子西銘其大意皆與此合他如曰公曰愛之類自同體而推之皆可見矣操舍之為言猶俗云提起放下但常常提掇此心無令放失即此是操操即敬也孔子嘗言敬以直內蓋此心常操而存則私曲更無所容不期其直而自直矣先儒有以主敬持敬為言者似乎欲密反踈後學或從而疑之又不知其實用工果何如也鳶飛魚躍之三言誠子思喫緊為人處復言君子之道造端乎夫婦則直窮到底矣蓋夫婦居室乃生生化化之源天命之性於是乎成率性之道於是乎出天下之至顯者實根於至微也聖賢所言無非實事釋氏既斷其根化生之源絶矣猶譊譊然自以為見性性果何物也哉有志於道者必透得富貴功名兩關然後可得而入不然則身在此道在彼重藩密障以間乎其中其相去日益逺矣夫為其事必有其功有其實其名自附聖賢非無功名但其所為皆理之當然而不容已者非有所為而為之也至於富貴不以其道得之且不處矧從而求之乎茍此心日逐逐於利名而亟談道德以為觀聽之美殆難免乎謝上蔡鸚鵡之譏矣鬼神乃二氣之良能莫非正也其或有不正者如淫昏之鬼與夫妖孽之類亦未始非二氣所為但陽氣盛則陽為之主隂為之輔而為正直之鬼神隂氣盛則隂為之主微陽反為之役而為不正之妖孽妖孽雖是戾氣無陽亦不能成此理至深要在精思而自得之非言説所能盡也凡妖孽之興皆由政教不明陽日消而莫之扶隂日長而莫之抑此感彼應猶影之於形自有不期然而然者然則消異致祥其道亦豈逺乎哉邵子云一動一靜者天地之至妙者歟一動一靜之間者天地人之至妙至妙者歟性命之理一言而盡之何其見之卓也又其詩有云須探月窟方知物未躡天根豈識人朱子遂取其詞以為之贊又有以深逹邵子之奧矣學者不求之動靜之間固無由見所謂月窟與天根茍天根月窟之不能知則所云至妙至妙者無乃徒為贊歎之辭而已儒先深意之所在讀者其可忽諸未發之中非惟人人有之乃至物物有之蓋中為天下之大本人與物不容有二顧大本之立非聖人不能在學者則不可不勉若夫百姓則日用而不知孟子所謂異於禽獸者幾希正指此爾先儒或以為常人更無未發之中此言恐誤若有無不一安得為物物各具一太極乎此義理至精微處斷不容二三其説也程子譏吕與叔不識大本非謂赤子無未發之中蓋以赤子之心不能無動動即有所偏著故不可謂之大本爾然中之本體固自若也且其雖有偏著而常純一無偽是以孟子取之即此推尋中之為義亦庶乎其可識矣理一也必因感而後形感則兩也不有兩即無一然天地間無適而非感應是故無適而非理神化者天地之妙用也天地間非隂陽不化非太極不神然遂以太極為神以隂陽為化則不可夫化乃隂陽之所為而隂陽非化也神乃太極之所為而太極非神也為之為言所謂莫之為而為者也張子云一故神兩故化蓋化言其運行者也神言其存主者也化雖兩而其行也常一神本一而兩之中無弗在焉合而言之則為神分而言之則為化故言化則神在其中矣言神則化在其中矣言隂陽則太極在其中矣言太極則隂陽在其中矣一而二二而一者也學者於此須認教體用分明其或差之毫釐鮮不流於釋氏之歸矣天人物我之分明始可以言理一不然第承用舊聞而已窮理盡性以至於命二程所言乃大賢以上事張子所言乃學者事然物格知至則性命無不了然更無漸次若行到盡處則有未易言者爾程叔子答蘇季明之問有云中有甚形體然既謂之中也須有箇形象伯子嘗云中者天下之大本天地間亭亭當當直上直下之正理兹非形象而何凡有象皆可求然則求中於未發之前何為不可固知叔子此言非其終身之定論也形象與形體只爭一字形體二字皆實象字虛實之間然中之為象與易象又難概論要在善觀而默識之耳人物之生本同一氣惻隱之心無所不通故親親而仁民仁民而愛物皆理之當然自有不容已者非人為之使然也君子之仕也行其義也行吾義即所以盡吾仁彼溺於富貴而忘返者固無足論偏守一節以為髙者亦未足與言仁義之道也論治道當以格君心為本若伊尹之輔太甲周公之輔成王皆能使其君出昏即明克終厥德商周之業賴以永延何其盛也後世非無賢相隨事正救亦多有可稱考其全功能庶幾乎伊周者殊未多見蓋必有顔孟之學術然後伊周之相業可希然則作養人才又誠為治之急務欲本之正而急務之不知猶臨川而乏舟楫吾未見其能濟也已作養人才必由於學校今學校之教純用經術亦云善矣但以科舉取士學者往往先詞藻而後身心此人才之所以不如古也若因今之學校取程子教養選舉之法推而行之人才事業逺追商周之盛宜有可冀所謂堯舜之智急先務其不在兹乎其不在兹乎古之立政也將以足民今之立政也惟以足國古之為政者將以化民今之為政者愚夫愚婦或從而議之何民之能化知人之所以為難者迹然而心或不然也君子心乎為善固無不善之迹小人心乎為惡然未嘗不假仁義以蓋其姦其姦愈深則其蓋之也愈密幸而有所遇合則其附會彌縫也愈巧自非洞見其心術有不信其為君子已乎雖其終於必敗然國家受其禍害有不可勝救者矣載稽前史歷歷可徴夫人固未易知茍清明在躬其誠偽亦何容隱或乃蔽於私纍於欲失其所以照臨之本夫安得不謬乎然則知言之學正心之功是誠官人者之所當致力也法有當變者不可不變不變即無由致治然欲變法須是得人誠使知道者多尚德者衆無彼無已惟善是從則於法之當變也相與議之必精既變也相與守之必固近則為數十年之利逺則數百年之利亦可致也以天下之大知道者安敢以為無人誠得其人以為之表率薰陶鼓舞自然月異而歲不同近則五年逺則十年真才必當接踵而出矣且談道與議法兩不相悖而實相資三五年間亦何事之不可舉邪嘗自一邑觀之為政者茍非其人民輒生慢易之心雖嚴刑峻法無益也一旦得賢者而臨之民心即翕然歸向其賢不肖亦不必久而後信但一嚬笑一舉措之間民固已窺而得之風聲之流不疾而速其向背之情自有不約而同者乃感應之常理也故君子之守修其身而天下平大臣之業一正君而國定知逺之近知風之自知微之顯斯可以為政矣政與德無二道也忠告善道非惟友道當然人臣之進言於君其道亦無以易此故矯激二字所宜深戒夫矯則非忠激則未善欲求感格難矣然激出於忠誠猶可如或出於計數雖幸而有濟其如勿欺之戒何哉為治者常患於乏才才固未嘗乏也顧求之未得其方爾蓋必各舉所知然後天下之才畢見於用孔子告仲弓云舉爾所知爾所不知人其舍諸此各舉所知之義也今舉賢之路殊狹未仕者既莫得而舉已仕者自藩臬以至郡邑以一道計之其人亦不少矣而其賢否率取決於一二人之言以此而欲求盡天下之才其可得乎非有以變而通之乏才之嘆何能免也制度立然後可以阜俗而豐財今天下財用日窘風俗日敝皆由制度隳廢而然也故自衣服飲食宫室輿馬以至於冠婚喪祭必須貴賤有等上下有别則物無妄費而財可豐人無妄取而俗可阜此理之不易者也然法之不行自上犯之君子之德風小人之德草是在朝廷而已矣井田勢不可復限田勢未易行天下之田雖未能盡均然亦當求所以處之之術不然養民之職無時而舉矣今自兩淮南北西極漢沔大率土曠人稀地有遺利而江浙之民特為蕃庶往往無田可耕於此有以處之其所濟亦不少矣以佚道使民雖勞不怨學道愛人之君子豈無念及於此者乎然漢之朝錯得行其䇿於塞下宋之陳靖不得行其説於京西此則係乎上之人明與斷何如耳理財之道大學四言盡之而後世鮮不相戾公私交病固其所也今太倉之粟化為月課以入權門者不可勝計內庫之出內司國計者不復預聞謂有政事可乎經費不足則橫斂亟行奈之何民不窮且盜也且唐之德宗猶能納楊炎之請立移財賦於左藏况乃英明之主抑又何難由此推類以盡其餘財不可勝用矣唐宋諸名臣多尚禪學學之至者亦儘得受用蓋其生質既美心地復緣此虛靜兼有稽古之功則其運用酬酢雖不中不逺矣且凡為此學者皆不隱其名不諱其實初無害其為忠信也故其學雖誤其人往往有足稱焉後世乃有儒其名而禪其實諱其實而侈其名者吾不知其反之於心果何如也天下大器也必以天下為度者始能運之才不足恃也雖有過人之才而未聞君子之道其器固易盈也弗盈則大以大運大不其裕乎人才之見於世或以道學或以詞章或以政事大約有此三等其間又各有淺深髙下之異然皆所謂才也但以余所見聞道學之名世多不喜而凡為此學者名實亦未必皆副又或未能免於驕吝此嫌謗之所自生也夫學以求道自是吾人分內事以此忌人固不可以之驕人亦惡乎可哉且形迹一分勢將無所不至程蘇之在元祐其事亦可鑒矣是故為士者當務修其實求士者必兼取其長如此則小大之才各以時成兩不相嫌而交致其用天下之治庶乎其有攸賴矣漢髙非不用儒顧真儒亦自難得爾當時如陸賈叔孫通輩帝皆嘗納其論説聽其施為然其規模力量概可見矣以漢髙之明逹有賢於二子者詎肯輕棄之乎魯兩生不從叔孫之招楊子雲以大臣許之未知何所見而云然也夫謂禮樂積德百年而後可興其言未為無理然百年之內必當有所從事况乎禮樂之為用為天下國家不可一日無者兩生果大賢歟於其本末先後之序固宜有定見矣即有定見盍出而一陳之使其言果可行而帝不從去就固在我也且惡知其不能用遂視一叔孫生以為行止不亦坐失事幾之會哉以愚觀之兩生於道未必有聞蓋偏守一節以為高者爾不出則為兩生出則為四皓恐未足以當大臣之選也唐府兵之法最為近古范文正公嘗議欲興復而為衆説所持道之廢興信乎其有命也愚於此頗嘗究心竊以此法之行灼然有利而無害揆之人情事勢亦無不可行之理顧其脈絡之相聨屬者非一處條目之相管攝者非一端變通之宜要當臨時裁酌非一言所能盡也然須推廣其制通行於天下使郡邑無處無偹緩急斯有所恃以無虞其老弱無用坐食之兵皆歸之農自然國用日舒民力日裕此灼然之利非簸弄筆舌之空談也楚漢之爭天下髙帝身拒項羽於榮陽成臯間令韓信北渡河取魏取趙取燕取齊河北山東之地既舉羽在漢圍中矣然其南猶有九江王黥布圍未合也及隋何以布歸漢則其圍四合矣羽復安所逃乎此漢取天下之大勢也凡用兵制勝以識形勢為先然有天下之形勢有一方之形勢有戰陳間之形勢得之則成失之則敗成敗之為利害有不可勝計者矣今之儒者鮮或談兵要之錢穀甲兵皆吾人分內事何可以不講也且如唐安祿山既犯東京眷留不去李泌郭子儀皆請先取范陽以覆其巢穴此真識形勢者也肅宗急於收復不從其䇿河北之地由此失之終唐之世而不能復黃巢橫行入廣高駢請分兵守郴循梧昭桂永數州之險自將由大庾度嶺擊之此真識形勢者也使從其言巢直置中兔爾而當國者曾莫之省巢果覆出為惡遂致滔天然則形勢之所繫豈小哉天之道日月星辰為之經風雨雷霆霜露為之緯經緯有常而元亨利貞之妙在其中矣此造化之所以成也人之道君臣父子夫婦長幼朋友為之經喜怒哀樂為之緯經緯不忒而仁義禮智之實在其中矣此德業之所以成也周子之言性有自其本而言者誠源誠立純粹至善是也有據其末而言者剛善剛惡柔亦如之中焉止矣是也然通書首章之言渾淪精密讀者或有所未察遂疑周子專以剛柔善惡言性其亦踈矣太極隂陽之妙善觀者試求之一歲之內自當了然一日之內亦可觀然太近而難詳也一元之內亦可觀然太逺而難驗也要之近而一日逺而一元其盈虛消息相為循環之理即一歲而推之無有不合易言復其見天地之心蓋明指其端矣茍明乎此其於酬酢世變又豈待於外求也哉性無形雖有善譬終難盡其妙孟子程子皆嘗取譬於水其言有不容易者蓋以就下之與在山清之與濁同一物也然至語其不善一則以為摶擊使之一則以為泥沙混之是亦微有不同必也會二説而同之性之義庶其盡矣謝顯道記伊川先生語有云禪家之言性猶太陽之下置器其間方員大小不同特欲傾此於彼爾然在太陽幾時動伊川此語足以破禪家之謬然又言人之於性猶器之受光於日受字固與傾字不類但此譬終覺未親程伯子論生之謂性一章反覆推明無非理一分殊之義朱子為學者條析雖詞有詳略而大旨不殊然似乎小有未合請試陳之夫謂人生氣稟理有善惡以其分之殊者言也然不是性中元有此兩物相對而生以其理之一者言也謂人生而靜以上不容説蓋人生而靜即未發之中一性之真湛然而已更著言語形容不得故曰不容説繼之者善即所謂感於物而動也動則萬殊剛柔善惡於是乎始分矣然其分雖殊莫非自然之理故曰惡亦不可不謂之性既以剛柔善惡名性則非復其本體之精純矣故曰才説性時便已不是性也下文又以水之清濁為喻蓋清其至靜之本體而濁其感動之物欲也本體誠至清然未出山以前無由見也亦須流行處方見若夫不能無濁安可無修治之功哉修治之功既至則濁者以之澄定而本體當湛然矣然非能有所增損於其間也故以舜有天下而不與終之切詳章內以上二字止是分截動靜之界由動而言則靜為以上猶所謂未發之前未發更指何處為前蓋據已發而言之耳朱子於此似求之太過却以為人物未生時恐非程子本意蓋程子所引人生而靜一語正指言本然之性繼以才説性時便已不是性二語蓋言世所常説乃性之動而非性之本也此意甚明詳味之自可見若以人生而靜以上為指人物未生時説則是説維天之命不是性三字無著落矣程叔子云孟子言性當隨文看不以告子生之謂性為不然者此亦性也被命受生之後謂之性爾故不同繼之以犬之性猶牛之性牛之性猶人之性歟然不害為一若乃孟子之言善者乃極本窮源之性嘗考叔子論性之語亦多惟此章意極完偹同中有異異中有同性命之實無餘無欠但章末二語恐記録者不能無少誤耳蓋受氣之初犬牛與人其性未嘗不一成形之後犬牛與人其性自是不同叔子所云不害為一正指本源處言之而下文若乃二字却説開了語脈殊欠照應非記録之誤而何二程教人皆以知識為先其言見於遺書及諸門人所述歷歷可考大學所謂欲誠其意者先致其知知至而后意誠此不易之序也及考朱子之言則曰上蔡説先有知識以敬㴠養似先立一物了他日却又有云未能識得􅉼養箇甚嘗屢稱明道學者先須識仁一假説話極好及胡五峯有欲為仁必先識仁之體之言則又大以為疑却謂不必使學者先識仁體其言之先後不一如此學者將安所適從哉愚嘗竊以所從入者驗之斷非先有知識不可苐識仁大是難事明道嘗言天理二字是自家體貼出來此所以識仁之方也然體貼工夫須十分入細一毫未盡即失其真朱子之言大抵多隨學者之偏而救之是以不一然因其不一而求以歸於至一在我有餘師矣理之所在謂之心故非存心則無以窮理心之所有謂之性故非知性則無以盡心孟子言心言性非不分明學者往往至於錯認何也求放心只是初下手工夫盡心乃其極致中間緊要便是窮理窮理須有漸次至於盡心知性則一時俱了更無先後可言如理有未窮此心雖立終不能盡吾人之有事於心地者其盡與不盡反觀內省亦必自知不盡而自以為盡是甘於自欺而已矣非誠有志於道者延平李先生曰動靜真偽善惡皆對而言之是世之所謂動靜真偽善惡也非性之所謂動靜真偽善惡也惟求靜於未始有動之先而性之靜可見矣求真於未始有偽之先而性之真可見矣求善於未始有惡之先而性之善可見矣此等言語是實下細密工夫體貼出來不可草草看過動亦定靜亦定性之本體然也動靜之不常者心也聖人性之心即理理即心本體常自湛然了無動靜之别常人所以膠膠擾擾曽無須叟之定貼者心役於物而迷其性也夫事物雖多皆性分中所有茍能順其理而應之亦自無事然而明有未燭誠有弗存平時既無所主則臨事之際又惡知理之所在而順之乎故必誠明兩進工夫純熟然後定性可得而言此學者之所當勉也既不知尊德性焉有所謂道問學此言未為不是但恐差認却德性則問學直差到底原所以差認之故亦只是欠却問學工夫要必如孟子所言博學詳説以反説約方為善學茍學之不博説之不詳而蔽其見於方寸之間雖欲不差弗可得已程子有云世人只為一齊在那昏惑迷暗海中拘滯執泥坑裏便事事轉動不得沒著身處此言於人甚有所警發但不知如何出脫得也然上文已有物各付物一言只是難得到此地位非物格知至而妄意及此其不為今之狂者幾希凡言心者皆是已發程子嘗有是言既自以為未當而改之矣朱子文字猶有用程子舊説未及改正處如書傳釋人心道心皆指為已發中庸序中所以為知覺者不同一語亦皆已發之意愚所謂未定於一者此其一也命之理一而已矣舉隂陽二字便是分殊推之至為萬象性之理一而已矣舉仁義二字便是分殊推之至為萬事萬象雖衆即一象而命之全體存焉萬事雖多即一事而性之全體存焉天之道莫非自然人之道皆是當然凡其所當然者皆其自然之不可違者也何以見其不可違順之則吉違之則凶是之謂天人一理吾儒只是順天理之自然佛老二氏皆逆天背理者也然彼亦未嘗不以自然藉口卲子有言佛氏棄君臣父子夫婦之道豈自然之理哉片言可以折斯獄矣顧彼猶善為遁辭以謂佛氏門中不舍一法夫既舉五倫而盡棄之矣尚何法之不舍邪獨有誑取人財以為飽暖安居之計乃其所不能舍之法耳靜中有物者程伯子所謂亭亭當當直上直下之正理是也朱子以為思慮未萌而知覺不昧似乎欠一理字學者或認從知覺上去未免失之人心有覺道體無為熟味此兩言亦可以見心性之别矣朱子辨蘇黃門老子解有云道器之名雖異然其實一物也故曰吾道一以貫之與所云理氣決是二物者又不同矣為其學者不求所以歸於至一可乎乾以易知坤以簡能此人之良知良能所自來也然乾始物坤成物固自有先後之序矣其在學者則致知力行工夫要當並進固無必待所知既徹而後力行之理亦未有所知未徹而能不疑其所行者也然此只在自勉若將來商量議擬第成一場間説話耳果何益哉張子韶以佛語釋儒書改頭換面將以愚天下之耳目其得罪於聖門亦甚矣而近世之談道者或猶隂祖其故智往往假儒書以彌縫佛學律以春秋誅心之法吾知其不能免夫困知記卷上
