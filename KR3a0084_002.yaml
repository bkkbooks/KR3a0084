body:
  text: 困知記卷下明羅欽順撰凡七十五章嘗讀宋學士新刻楞伽經序具載我聖祖訓詞由是知聖祖洞明佛學又嘗讀御製神樂觀碑有云長生之道世有之不過修身清净脫離幻化疾速去來使無難阻是其機也於此又知我聖祖深明老氏之學至於經綸萬務垂訓萬世一惟帝王相傳之道是遵孔曾思孟之書周程張朱之說是崇是信彛倫攸叙邪慝無所容聖子神孫守為家法雖與天地同其悠久可也卓哉大聖人之見誠高出於尋常萬萬哉易之為書有辭有變有象有占變與象皆出於自然其理即所謂性命之理也聖人繫之辭也特因而順之而深致其意於吉凶悔吝之占凡以為立人道計爾夫變之極其象斯定象既定而變復生二者相為循環無有窮已文言曰知進退存亡而不失其正者其惟聖人乎夫消變於未形聖人之能事也自大賢以下必資於學繫辭曰君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利此學易之極功也占也者聖人於其變動之初逆推其理勢必至於此故明以為教欲人豫知所謹以免乎悔吝與凶若待其象之既成則無可免之理矣使誠有得於觀玩固能適裁制之宜其或於卜筮得之亦可以不迷乎趨避之路此人極之所以立也是則君子之玩占乃其日用工夫初無待於卜筮若夫卜筮之所尚則君子亦未嘗不與衆人同爾聖人作易之意或者其有在於是乎程子言聖人用意深處全在繫辭蓋子貢所謂性與天道不可得而聞者繫辭發明殆盡學者茍能有所領㑹則天下之理皆無所遺凡古聖賢經書微言奧義自然通貫為一而確乎有以自信視彼異端邪說真若蹄涔之於滄海碔砆之於美玉矣然或韋編屢絶而不能辨世間之學術則亦何以多讀為哉劉保齊於卦德卦體卦象從朱子卦變從程子其義甚精蓋亦因其言之不一而求以歸於至一可謂篤於尊信程朱者矣詩三百十一篇人情世態無不曲盡燕居無事時取而諷詠之歷歷皆目前事也其可感者多矣百爾君子不知德行不忮不求何用不臧其言誠有味哉範圍天地之化而不過程子云模範出一天地爾非在外也如此即是與天道吻合之意所謂不過者在聖人朱子云天地之化無窮而聖人為之範圍不使過於中道所謂裁成者也如此則所謂不過者疑若指化育然竊惟天地之化消息盈虛而已其妙雖不可測而理則有常聖人裁成之云亦惟因其時順其理為之節度以遂生人之利非能有所損益也不使過於中道一語似乎缺瑩若程說則簡而明矣東北喪朋乃終有慶程傳之義為精用說桎梏覺得本義尤與上下文相協年來深喜讀易但精神漸短浹洽為難爾大凡讀傳義者於其異同之際切宜致思孔子作春秋每事只舉其大綱以見意義其詳則具於史當時史文具在觀者便見得是非之公所以春秋成而亂臣賊子懼其後史既亡逸惟聖筆獨存左氏必曾見國史來故其作傳皆有來歷雖難於盡信終是案底尚書有難曉處正不必枉費心思强通得亦未必是於其明白易曉者熟讀而有得焉殆不可勝用矣書言以義制事以禮制心易言敬以直內義以方外大㫖初無異也但以字在義禮上則人為之主與理猶二以字在敬義下則敬義為之主人與理一矣其工夫之疏密造詣之淺深固當有别堯典有知人之道四嚚訟一也靜言庸違象恭二也方命圯族三也皆所以知小人克諧以孝四也所以知君子嚚訟與圯族皆所謂剛惡也靜言象恭柔惡也小人之情狀固不止此然即此三者亦可以概之孝乃百行之首漢去古未逺猶以孝廉取士然能使頑父嚚母傲弟相與感化而不格姦則天下無不可化之人矣非甚盛德其孰能之堯典所載厯象授時外惟此四事乃其舉措之大者所舉若此所措若彼非萬世君天下者之法乎茍能取法於斯雖欲無治不可得已春秋殊未易讀程子嘗言以傳考經之事迹以經别傳之真僞如歐陽文忠所論魯隱趙盾許止三事可謂篤信聖經而不惑於三傳者矣及胡文定作傳則多用三傳之說而不從歐公人之所見何若是之不同邪夫聖筆之妙如化工固不容以淺近窺測然求之太過或反失其正意惟虛心易氣反覆潜玩勿以衆說汩之自嘗有得也三傳所長固不容掩然或失之誣或失之鑿安可盡以為據乎竊謂歐公之論恐未可忽舍程子兩言亦無以讀春秋矣能者養以之福纍見諸本皆作養之以福倒却一字其意味理致逈然不同承訛踵誤若此類蓋亦多矣樂記人生而靜天之性也感於物而動性之欲也一段義理精粹要非聖人不能言陸象山乃從而疑之過矣彼蓋專以欲為惡也夫人之有欲固出於天蓋有必然而不容已且有當然而不可易者於其所不容已者而皆合乎當然之則夫安往而非善乎惟其恣情縱欲而不知反斯為惡爾先儒多以去人欲遏人欲為言蓋所以防其流者不得不嚴但語意似乎偏重夫欲與喜怒哀樂皆性之所有者喜怒衰樂又可去乎象山又言天亦有善有惡如日月蝕惡星之類是固然矣然日月之食彗孛之變未有不旋復其常者兹不謂之天理而何故人道所貴在乎不逺而復奈何滔滔者天下皆是也是則循其本而言之天人曷嘗不一究其末也亦安得而不二哉曽子問昏禮既納幣有吉日而壻之父母死已葬使人致命女氏曰某之子有父母之喪不得嗣為兄弟女氏許諾而弗敢嫁禮也壻免喪女之父母使人請壻弗取而后嫁之禮也女之父母死壻亦如之陳澔集說謂壻祥禫之後女之父母使人請壻成昏壻終守前說而不取而后此女嫁於他族若女免喪壻之父母使人請女家不許壻然後别娶此於義理人情皆說不通何其謬也安有婚姻之約既定直以喪故需之三年之久乃從而改嫁與别娶邪蓋弗取弗許者免喪之初不忍遽爾從吉故辭其請亦所謂禮辭也其後必再有往復昏禮乃成聖人雖未嘗言固可以義推也澔之集說未為無功於禮但小小疏失時復有之然害理傷教莫此為甚易逐卦逐爻各是一象象各具一理其為象也不一而理亦然然究而論之象之不一是誠不一也理之不一蓋無往而非一也故曰同歸而殊塗一致而百慮非知道者孰能識之孟子性也有命焉命也有性焉一章語意極為完備正所謂理一而分殊也當時孟子與告子論性皆隨其說而折難之故未暇及此如使告子得聞斯義安知其不悚然而悟俯焉而伏也董子云性者生之質也觀告子論性前後數說其大㫖不出生質二字而已董子知尊孔子未必不知有孟子之說而顧有合於告子豈其亦有所受之邪周子太極圖說篇首無極二字如朱子之所解釋可無疑矣至於無極之真二五之精妙合而凝三語愚則不能無疑凡物必兩而後可以言合太極與隂陽果二物乎其為物也果二則方其未合之先各安在邪朱子終身認理氣為二物其源蓋出於此愚也積數十年潛玩之功至今未敢以為然也嘗考朱子之言有云氣强理弱理管攝他不得若然則所謂太極者又安能為造化之樞紐品物之根柢邪惜乎當時未有以此說叩之者姑記於此以俟後世之朱子云朱子謂通書之言皆所以發明太極之藴然書中並無一言及於無極不知果何說也通書四十章義精詞確其為周子手筆無疑至如五殊二實一實萬分數語反覆推明造化之妙本末兼盡然語意渾然即氣即理絶無罅縫深有合乎易傳乾道變化各正性命之㫖與所謂妙合而凝者有間矣知言之君子不識以為何如張子正蒙由太虛有天之名數語亦是將理氣看作二物其求之不為不深但語涉牽合殆非性命自然之理也嘗觀程伯子之言有云上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神其命於人則謂之性只將數字剔撥出來何等明白學者若於此處無所領悟吾恐其終身亂於多說未有歸一之期也正蒙云聚亦吾體散亦吾體知死之不亡者可與言性矣又云游氣紛擾合而成質者生人物之萬殊其隂陽兩端循環不已者立天地之大義夫人物則有生有死天地則萬古如一氣聚而生形而為有有此物即有此理氣散而死終歸於無無此物即無此理安得所謂死而不亡者邪若夫天地之運萬古如一又何死生存亡之有譬之一樹人物乃其花葉天地其根幹也花謝葉枯則脫落而飄零矣其根幹之生意固自若也而飄零者復何交涉謂之不亡可乎故朱子謂張子此言其流乃是箇大輪回由其迫切以求之是以不覺其誤如此游氣紛擾合而成質者生人物之萬殊隂陽兩端循環不已者立天地之大義中庸有兩言盡之曰小德川流大德敦化曽子易簀仁也子路結纓勇也恐未可一而視之釋經小有不同未為大害至於義理之本原毫髮不容差互也正蒙中論禮器禮運甚詳究其歸不出體用兩言而已體立則用行體信斯達順矣正蒙有云隂陽之氣循環迭至聚散相蕩升降相求絪緼相揉蓋相兼相制欲一之而不能此其所以屈伸無方運行不息莫或使之不曰性命之理謂之何哉此段議論最精與所謂太虛氣化者有間矣蓋其窮思力索隨有所得即便劄記先後初不同時故淺深疏密亦復不一讀者擇焉可也六經之道同歸而禮樂之用為急然古禮古樂之亡也久矣其遺文緒論僅有存者學者又鮮能熟讀其書深味其㫖詳觀其㑹通斟酌其可行之實遂使先王之禮樂曠千百年而不能復其施用於當世者類多出於穿鑿附㑹之私而已可慨也夫卲子因學數推見至理其見處甚超殆與二程無異而二程不甚許之者蓋以其發本要歸不離於數而已其作用既别未免與理為二也故其出處語默揆之大中至正之道時或過之程伯子嘗語學者云賢看某如此某煞用工夫蓋必反身而誠斯為聖門一貫之學爾天道之變盡於春夏秋冬世道之變盡於皇帝王霸是固然矣然一年之內四氣常均且冬則復春春則復夏自三皇以至今日蓋四千餘年而霸道獨為長久何也豈天道往則必復世道將一往而遂不反邪僅有一說王霸之道雖殊然霸者之所假亦必帝王之道漢唐宋皆多歷年所其間帝王之道固嘗少試於天下然則雖謂之帝王之世可矣視聽思慮動作皆天也人但於其中要識得真與妄爾動以天之謂真動以人之謂妄天人本無二人只緣有此形體與天便隔一層除却形體渾是天也然形體如何除得但克去有我之私便是除也卲子云中庸非天降地出揆物之理度人之情行其所安斯為得矣愚竊以為物理人情之所安固從天降地出者也子思作中庸一書首言天命之謂性終以上天之載無聲無臭二語中間散為萬事有一不出於天者乎故君子依乎中庸無非順天而已不容一毫私智有所作為於其間也以卲子之高明固已妙達天人之藴而其言如此豈其急於誘進學者姑指而示之近歟記禮者亦有此言要非深意之所存也春秋事迹莫詳於左傳左氏於聖人筆削意義雖無甚發明然後之學春秋者得其事迹為據而聖經意義所在因可測識其功亦不少矣且如楚世子啇臣之惡向非左傳載之之詳何由知其惡之所自既不知其惡之所自則聖人垂戒之意荒矣蓋凡篡弒之書非但以垂戒臣子亦以垂戒君父夫君不君則臣不臣父不父則子不子此一說也君雖不君臣不可以不臣父雖不父子不可以不子此又一說也君君臣臣父父子子然後綱常正而品物遂此春秋所以有功於萬世也或乃謂春秋凡書弒君弒即是罪何必更求其詳果如其言即不過發讀者一長嘆而已於世道竟何補而聖人又奚以作春秋為哉理須就氣上認取然認氣為理便不是此處間不容髮最為難言要在人善觀而默識之只就氣認理與認氣為理兩言明有分别若於此看不透多說亦無用也或問楊龜山易有太極莫便是道之所謂中否曰然若是則本無定體當處即是太極邪曰然兩儀四象八卦如何自此生曰既有太極便有上下有上下便有左右前後有左右前後四方便有四維皆自然之理也龜山此段說話詞甚平易而理極分明直是看得透也然學者於此當知聖人所謂太極乃據易而言之蓋就實體上指出此理以示人不是懸空立說須子細體認可也謝上蔡有言心之窮物有盡而天者無盡如之何包之此言不知為何而發夫人心之體即天之體本來一物無用包也但其主於我者謂之心爾心之窮物有盡由窮之而未至爾物格則無盡矣無盡即無不盡夫是之謂盡心心盡則與天為一矣如其為物果二又豈人之智力之所能包也哉程伯子嘗言萬物皆備於我不獨人爾物皆然佛家亦言蠢動含靈皆有佛性其大㫖殆無異也而伯子不可其說愚嘗求其所以不可之故竟莫能得也夫佛氏之所謂性者覺吾儒之所謂性者理得失之際無待言矣然人物之生莫不有此理亦莫不有此覺以理言之伯子所謂不獨人爾物皆然是也以覺言之蠢動含靈與佛容有異乎凡伯子之言前後不同者似此絶少愚是用反覆推究以求歸於至一云國初深於理學者殊未多見禪學中却儘有人儒道之不融雖則有數存焉吾人不得不任其責也當時宋潜溪為文臣之首文章議論施於朝廷而達之天下者何可勝述然觀其一生受用無非禪學而已以彼之聰明博洽使於吾道誠加之意由博而約當有必至之理其所成就豈不偉然為一代之巨儒哉棄周鼎而寶康瓠吾不能不深為潜溪惜也禪學畢竟淺若於吾道有見復取其說而詳究之毫髮無所逃矣朱陸之異同雖非後學所敢輕議然置而弗辨將莫知所適從於辨宜有不容已者辨之弗明而弗措焉必有時而明矣豈可避輕議先儒之咎含胡兩可以厚誣天下後世之人哉夫斯道之弗明於天下凡以禪學混之也其初不過毫釐之差其究奚啻千萬里之逺然為禪學者既安於其陋了不知吾道之為何物為道學者或未嘗通乎禪學之本末亦無由真知其所以異於吾道者果何在也嘗考兩程子張子朱子早嵗皆嘗學禪亦皆能究其底藴及於吾道有得始大悟禪學之非而盡棄之非徒棄之而已力排痛闢閔閔焉惟恐人之陷溺於其中而莫能自振以重為吾道之纍凡其排闢之語皆有以洞見其肺腑而深中其膏肓之病初非出於揣摩臆度之私也故朱子目象山為禪學蓋其見之審矣豈嘗有所嫌忌必欲文致其罪而故加之以是名哉愚自受學以來知有聖賢之訓而已初不知所謂禪者何也及官京師偶逢一老僧漫問何由成佛渠亦漫舉禪語為答云佛在庭前柏樹子愚意其必有所謂為之精思達旦攬衣將起則恍然而悟不覺流汗通體既而得禪家證道歌一編讀之如合符節自以為至竒至妙天下之理莫或加焉後官南雍則聖賢之書未嘗一日去手潜玩久之漸覺就實始知前所見者乃此心虛靈之妙而非性之理也自此研磨體認日復一日積數十年用心甚苦年垂六十始了然有見乎心性之真而確乎有以自信朱陸之學於是乎僅能辨之良亦鈍矣蓋嘗遍閲象山之書大抵皆明心之說其自謂所學因讀孟子而自得之時有議之者云除了先立乎其大者一句全無伎倆其亦以為誠然然愚觀孟子之言與象山之學自别於此而不能辨非惟不識象山亦不識孟子矣孟子云耳目之官不思而蔽於物物交物則引之而已矣心之官則思思則得之不思則不得也此天之所以與我者先立乎其大者則其小者不能奪也一段言語甚是分明所貴乎先立其大者何以其能思也能思者心所思而得者性之理也是則孟子喫緊為人處不出乎思之一言故他日又云仁義禮智非由外鑠我也我固有之也弗思耳矣而象山之教學者顧以為此心但存則此理自明當惻隱處自惻隱當羞惡處自羞惡當辭遜處自辭遜是非在前自能辨之又云當寬裕溫柔自寬裕溫柔當發强剛毅自發强剛毅若然則無所用乎思矣非孟子先立乎其大者之本㫖也夫不思而得乃聖人分上事所謂生而知之者而豈學者之所及哉茍學而不思此理終無由而得凡其當如此自如此者雖或有出於靈覺之妙而輕重長短類皆無所取中非過焉斯不及矣遂乃執靈覺以為至道謂非禪學而何蓋心性至為難明象山之誤正在於此故其發明心要動輒數十百言亹亹不倦而言及於性者絶少間因學者有問不得已而言之止是枝梧籠罩過並無實落良由所見不的是以不得於言也嘗考其言有云心即理也然則性果何物邪又云在天者為性在人者為心然則性果不在人邪既不知性之為性舍靈覺即無以為道矣謂之禪學夫復何疑然或者見象山所與王順伯書未必不以為禪學非其所取殊不知象山陽避其名而隂用其實也何以明之蓋書中但言兩家之教所從起者不同初未嘗顯言其道之有異豈非以儒佛無二道惟其主於經世則遂為公為義為儒者之學乎所謂隂用其實者此也或者又見象山亦嘗言致思亦嘗言格物亦嘗言窮理未必不以為無背於聖門之訓殊不知言雖是而所指則非如云格物致知者格此物致此知也窮理者窮此理也思則得之得此者也先立乎其大者立此者也固皆本之經傳然以立此者也一語證之則凡所謂此者皆指心而言也聖經之所謂格物窮理果指心乎故其廣引博證無非以曲成其明心之說求之聖賢本㫖竟乖戾而不合也或猶不以為然請復實之以事有楊簡者象山之髙第弟子也嘗發本心之問遂於象山言下忽省此心之清明忽省此心之無始末忽省此心之無所不通有詹阜民者從游象山安坐暝目用力操存如此者半月一日下樓忽覺此心已復澄瑩象山目逆而視之曰此理已顯也蓋惟禪家有此機軸試觀孔曽思孟之相授受曽有一言似此否乎其證佐之分明脉路之端的雖有善辨殆不能為之出脫矣蓋二子者之所見即愚往年所見之光景愚是以能知其誤而究言之不敢為含胡兩可之詞也嗟夫象山以英邁絶人之資遇髙明正直之友使能虛心易氣舍短取長以求歸於至當即其所至何可當也顧乃眩於光景之竒特而忽於義理之精微向道雖勤而朔南莫辨至於沒齒曽莫知其所以生者不亦可哀也夫其說之傳至於今未泯尊崇而信奉之者時復有見於天下杜牧之有云亦使後人而復哀後人也愚惕然有感乎斯言是故不容於不辨程子曰聖賢千言萬語只是欲人將已放之心約之使反復入身來自能尋向上去下學而上達也嘗見席文同鳴寃録提綱有云孟子之言程子得之程子之後陸子得之然所引程子之言只到復入身來而止最緊要是自能尋向上去下學而上達二語却裁去不用果何說邪似此之見非惟無以直象山之寃正恐不免寃屈程子也程子言性即理也象山言心即理也至當歸一精義無二此是則彼非彼是則此非安可不明辨之昔吾夫子贊易言性屢矣曰乾道變化各正性命曰成之者性曰聖人作易以順性命之理曰窮理盡性以至於命但詳味此數言性即理也明矣於心亦屢言之曰聖人以此洗心曰易其心而後語曰能說諸心夫心而曰洗曰易曰說洗心而曰以此試詳味此數語謂心即理也其可通乎且孟子嘗言理義之悅我心猶芻豢之悅我口尤為明白易見故學而不取證於經書一切師心自用未有不自誤者也自誤已不可况誤人乎象山言孔子十五而志於學是已知道時矣雖有所知未免乍出乍入乍明乍晦或警或縱或作或輟至三十而立則無出入明晦警縱作輟之分矣然於事物之間未能灼然分明見得至四十始不惑夫其初志於學也即已名為知道緣何既立之後於事物之間見得猶未分明然則所已知者果何道所未見者果何物耶豈非以知存此心即為知道邪然象山固嘗有言但此心之存則此理自明以聖人之資猶待二十五年之久方能灼然有見則其言亦不副矣且所知所見各為一物吾聖人之學安有是哉愚非敢輕議先儒不直則道不見有罪我者固不得而辭也吳康齊之志於道可謂專且勤矣其所得之淺深無所考見觀其辭官後疏陳十事皆組織聖賢成說殊無統紀求之孟子反約之㫖得無有未至乎其辭官一節真足以廉頑立懦察其初意亦非以不屈為髙蓋欲少需歲時有所獻納觀其合否以為去就之决也但當時事體殊常形勢多阻淺深之際斟酌為難諸老所以不復堅留其或有見而康齊之决去所得亦已多矣謇齊瑣綴録記康齊晚年一二事雖未必誣然好學如康齊節操如康齊何可多得取其大而略其細固君子之道也薛文清讀書甚有體認工夫見得到處儘能到區區所見蓋有不期而合者矣然亦有未能盡合處信乎歸一之難也録中有云理氣無縫隙故曰器亦道道亦器其言當矣至於反覆證明氣有聚散理無聚散之說愚則不能無疑夫一有一無其為縫隙也大矣安得謂之器亦道道亦器耶蓋文清之於理氣亦始終認為二物故其言未免時有窒礙也夫理精深微妙至為難言茍毫髮失真雖欲免於窒礙而不可得故吾夫子有精義入神之訓至於入神則無往而不通矣此非愚所能及然心思則既竭焉嘗竊以為氣之聚便是聚之理氣之散便是散之理惟其有聚有散是乃所謂理也推之造化之消長事物之終始莫不皆然如此言之自是分明並無窒礙雖欲尋其縫隙了不可得矣不識知言之君子以為何如薛文清學識純正踐履篤實出處進退惟義之安其言雖間有可疑然察其所至少見有能及之者可謂君子儒矣讀書録有云韓魏公范文正諸公皆一片忠誠為國之心故其事業顯著而名望孚動於天下後世之人以私意小智自持其身而欲事業名譽比擬前賢難矣哉其言甚當薛文清蓋有此心非徒能為此言而已大抵能主忠信以為學則必有忠誠以事君事君之忠當素定於為學之日近世道學之倡陳白沙不為無力而學術之誤亦恐自白沙始至無而動至近而神此白沙自得之妙也愚前所謂徒見夫至神者遂以為道在是矣而深之不能極而幾之不能研雖不為白沙而發而白沙之病正恐在此章楓山嘗為余言其為學本末固以禪學目之胡敬齊攻之尤力其言皆有所據公論之在天下有不可得而誣者矣邱文莊公雅不喜陳白沙大學衍義中有一處譏議異學似乎為白沙發也然公之文學固足以名世而未有以深服白沙之心其卒也白沙祭之以文意殊不滿此殆程子所謂克己最難者也胡敬齊大類尹和靖皆是一敬字做成居業録中言敬最詳蓋所謂身有之故言之親切而有味也然亦儘窮理但似乎缺透如云氣乃理之所為又云人之道乃仁義之所為又云所以為是太和者道也又云有理而後有氣又云易即道之所為但熟讀繫辭傳其說之合否自見蓋朱子雖認理氣為二物然其言極有開闔有照應後來承用者思慮皆莫之及是以失之若余子積之性書則其甚焉者也性書有云氣嘗能輔理之美矣理豈不救氣之衰乎余偶為著一語云不謂理氣交相為賜如此胡敬齊力攻禪學蓋有志於間聖道者也但於禪學本末似乎未嘗深䆒動以想像二字斷之安能得其心服邪蓋吾儒之有得者固是實見禪學之有得者亦是實見但所見者不同是非得失遂於此乎判爾彼之所見乃虛靈知覺之妙亦自分明脫灑未可以想像疑之然其一見之餘萬事皆畢卷舒作用無不自由是以猖狂妄行而終不可與入堯舜之道也愚所謂有見於心無見於性當為不易之論使誠有見乎性命之理自不至於猖狂妄行矣蓋心性至為難明是以多誤謂之兩物又非兩物謂之一物又非一物除却心即無性除却性即無心惟就一物中分剖得兩物出來方可謂之知性學未至於知性天下之言未易知也居業録云婁克貞見搬木之人得法便說他是道此與運水搬柴相似指知覺運動為性故如此說夫道固無所不在必其合乎義理而無私乃可為道豈搬木者所能設使能之亦是儒者事矣其心必以為無適而非道然所搬之木茍不合義亦可謂之道乎愚讀此條不覺慨然興嘆以為義理之未易窮也夫法者道之别名凡事莫不有法茍得其法即為合理是即道也搬木者固不知道為何物但據此一事自是暗合道妙與夫婦之愚不肖與知能行一也道固無所不在若搬木得法而不謂之道得無有空缺處邪木所從來或有非義此其責在主者夫豈搬者之過邪若搬者即主則其得法處自是道得之非義自是非道顧可舉一而廢百邪禪家所言運水搬柴無非妙用蓋但以能搬能運者即為至道初不問其得法與否此其所以與吾儒異也克貞雖是禪學然此言却不差敬齊乃從而譏之過矣王伯安學術具在傳習録中觀其與蕭惠及陸原靜答問數章可謂吾無隱乎爾録中千言萬語無非是物而變動不居故驟而讀之者或未必能知其落著也原靜却善問儘㑹思索苐未知後來契合何如嘗得湛元明所著書數種觀其詞氣格力甚類楊子雲蓋欲成一家言爾然元明自處甚髙自負甚大子雲豈其所屑為哉區區之見多有未合恨無由相與細講以歸於至一姑記其一二如左一隂一陽之謂道吾夫子贊易語也元明云自其一隂一陽之中者謂之道然則聖人之言亦容有缺缺處邪殆不然矣易卦三百八十四爻中正備者六十有四中而不正者亦六十有四正而不中者百二十有八不中不正者亦百二十有八元明云吾觀於大易而知道器之不可以二也爻之隂陽剛柔器也得其中正焉道也其說器字甚明然但以得其中正者為道不過六十四爻而已餘爻三百二十以為非道則道器不容於不二矣如以為道則固未嘗得其中正也不識元明果何以處之邪元明言犬牛之性非天地之性即不知犬牛何從得此性來天地間須是二本方可所謂理一者須就分殊上見得來方是真切佛家所見亦成一片緣始終不知有分殊此其所以似是而非也其亦嘗有言不可籠統真如瞞盰佛性大要以警夫頑空者爾於分殊之義初無干涉也其既以事為障又以理為障直欲掃除二障乃為至道安得不為籠統瞞盰乎陳白沙謂林緝熙曰斯理無一處不到無一息不運得此欛柄入手更有何事其說甚詳末乃云自兹以往更有分殊處合要理㑹夫猶未嘗理㑹分殊而先已得此欛柄愚恐其未免於籠統瞞盰也况其理㑹分殊工夫求之所以自學所以教人皆無實事可見得非欲稍自别於禪學而姑為是言邪湛元明為作改葬墓碑並合要理㑹一句亦不用其平日之心傳口授必有在矣白沙詩教開卷第一章乃其病革時所作以示元明者也所舉經書曽不過一二語而遂及於禪家之杖喝何耶殆熟處難忘也所云莫杖莫喝只是掀翻說蓋一悟之後則萬法皆空有學無學有覺無覺其妙㫖固如此金針之譬亦出佛氏以喻心法也誰掇云者殆以領悟者之鮮其人而深屬意於元明耳觀乎莫道金針不傳與江門風月釣臺深之句其意可見注乃謂深明正學以闢釋氏之非豈其然乎溥博淵泉而時出之道理自然語意亦自然曰藏而後發便有作弄之意未可同年而語也四端在我無時無處而不發見知皆擴而充之即是實地上工夫今乃欲於靜中養出端倪既一味靜坐事物不交善端何緣發見遏伏之久或者忽然有見不過虛靈之光景耳朝聞夕死之訓吾夫子所以示人當汲汲於謀道庶幾無負此生故程子申其義云聞道知所以為人也夕死可矣是不虛生也今顧以此言為處老處病處死之道不幾於侮聖言者乎道乃天地萬物公共之理非有我之所得私聖賢經書明若日星何嘗有一言以道為吾為我惟佛氏妄誕乃曰天上天下惟我獨尊今其詩有云無窮吾亦在又云玉臺形我我何形吾也我也注皆指為道也是果安所本邪然則所謂才覺便我大而物小物有盡而我無盡正是惟我獨尊之說姑自成一家可矣必欲强合於吾聖人之道難矣哉楊方震復余子積書有云若論一則不徒理一而氣亦一也若論萬則不徒氣萬而理亦萬也此言甚當但亦字稍覺未安人呼吸之氣即天氣之氣自形體而觀若有內外之分其實一氣之往來爾程子云天人本無二不必言合即氣即理皆然蔡介夫中庸蒙引論鬼神數段極精其一生做窮理工夫且能力行所學蓋儒林中之傑出者老子五千言諸丹經莫不祖之詳其首尾殊未見其有不合者然則長生久視之道當出於老子無疑矣魏伯陽參同契將六十四卦翻出許多說話直是巧其實一字也無所用故有教外别傳之說後來張平叔說得亦自分明所謂工夫容易藥非遙說破人須失笑是已使吾朱子灼知其為可笑其肯留意於此乎然朱子之考訂此書與注楚辭一意蓋當其時其所感者深矣吾黨尤不可不知參同契有彭曉陳顯微儲華谷隂真人俞琰陳致虛六家注皆能得其微㫖內俞注最佳次則二陳隂注似乎意未盡達蓋祕之也儲注甚簡中間却有眼目彭注亦未甚明又有無名氏二家注一家專言內事一家以傅㑹爐火之術失之逺矣俞有易外别傳一卷亦佳其言大抵明備而含蓄此所以優於他注也讀參同契發揮到蟾蜍與兔魄日月無雙明下方出呼吸二字要之金丹作用之妙不出呼吸二字而已如不識此二字之為妙皆惑於他岐者也仙家妙㫖無出參同契一書然須讀悟真篇首尾貫通而無所遺方是䆒竟處也悟真篇本是發明仙家事末乃致意於禪其必有說矣然使真能到得䆒竟處果何用乎神仙之說自昔聰明之士鮮不慕之以愚之愚早亦嘗究心焉後方識破故詳舉以為吾黨告也天地間果有不死之物是為無造化矣誠知此理更不必枉用其心如其信不能及必欲僥幸於萬一載胥及溺當誰咎哉嘗閲佛書數種姑就其所見而論之金剛經心經可為簡盡圓覺詞意稍復法華緊要指示處才十二三餘皆閒言語耳且多誕謾逹磨雖不立文字直指人心見性成佛然後來說話不勝其多亦嘗略䆒其始終其教人發心之初無真非妄故云若見諸相非相即見如來悟入之後則無妄非真故云無明真如無異境界雖頓漸各持一說大抵首尾衡决真妄不分真詖淫邪遁之尤者如有聖王出韓子火攻之䇿其必在所取夫朱子嘗答金剛經大意之問有云彼所謂降伏者非謂欲遏伏此心謂盡降收世間衆生之心入它無餘涅槃中滅度都教你無心了方是此恐未然詳其語意只是就發阿耨多羅三藐三菩提心者說蓋欲盡滅諸相乃見其所謂空者耳法華經如來壽量品所云成佛以來甚大久逺壽命無量常住不滅雖不實滅而言滅度以是方便教化衆生此經中切要處諸佛如來祕密之藏不過如此閒言語居其大半可厭分别功德品偈中所說若布施若持戒若忍辱若精進若禪定五波羅蜜皆謂之功德及云有善男女等聞我說壽命乃至一念信其福過於彼蓋於雖滅不滅之語若信得及即是實見是為第一般若多羅蜜其功德不可思議以前五者功德比此千萬億分不及其一其實只爭悟與未悟而已事理二障出圓覺經其失無逃於程子之論矣經有草堂僧宗密疏略未及見但見其所自序及裴休一序說得佛家道理亦自分明要皆只是說心遂認以為性終不知性是何物也此經文法圓熟照應分明頗疑翻譯者有所潤色大抵佛經皆出翻譯者之手非盡當時本文但隨其才識以為淺深工拙焉耳中庸舉鳶飛戾天魚躍于淵二語而申之云言其上下察也佛家亦嘗有言青青翠竹盡是真如鬱鬱黃花無非般若語意絶相似只是不同若能識其所以不同自不為其所惑矣朱子嘗論及釋氏之學大抵謂若識得透應干罪惡即都無了然則此一種學在世上乃亂臣賦子之三窟耳所舉王履道者愚未及詳考其人但嘗驗之邢恕明辨有才而復染禪學後來遂無所不為吁可畏哉困知記卷下
