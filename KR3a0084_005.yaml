body:
  text: 困知記卷下明羅欽順撰凡三十三章癸巳春偶得慈湖遺書閲之纍日有不勝其慨嘆者痛哉禪學之誤人也一至此乎慈湖頓悟之機實自陸象山發之其自言忽省此心之清明忽省此心之無始末忽省此心之無所不通即釋迦所謂自覺聖智境界也書中千言萬語徹頭徹尾無非此箇見解而意氣之橫逸辭説之猖狂比之象山尤甚象山平日據其偏見橫説竪説直是果敢然於聖賢明訓有所未合猶且支吾籠罩過未敢公然叛之慈湖上自五經旁及諸子皆有論説但與其所見合者則以為是與其所見不合者雖明出於孔子輒以為非孔子之言而大學一書工夫節次其詳如此頓悟之説更無隙可投故其詆之尤力至凡孔子之微言大訓又往往肆其邪説以亂之刳實為虛揉直作曲多方牽合一例安排惟其偏見是就務令學者改視易聽貪新忘舊日漸月漬以深入乎其心其敢於侮聖言叛聖經貽誤後學如此不謂之聖門之罪人不可也世之君子曾未聞有能鳴鼓而攻之者反從而為之役果何見哉人心道心之辨只在毫釐之間道心此心也人心亦此心也一心而二名非聖人強分别也體之靜正有常而用之變化不測也須兩下見得分明方是盡心之學佛氏之於吾儒所以似是而實非者有見於人心無見於道心耳慈湖之志於道不為不篤然終蔽於所見直以虛靈知覺為道心夫安得不謬乎集中已易一篇乃其最所用意以誘進學徒者滚滚數千言將斷而復續左援右引陽開隂闔極其馳騁之力茫茫乎若無涯涘可窺然徐究其指歸不出乎虛靈知覺而已於四聖之易絶不相干參之佛氏之書則真如符節之合試舉一二以槩其餘其曰吾性澄然清明而非物吾性洞然無際而非量天者吾性中之象地者吾性中之形故曰在天成象在地成形皆我之所為楞嚴經所謂山河大地咸是妙明真心中物即其義也其曰目能視所以能視者何物耳能聽所以能聽者何物口能噬所以能噬者何物鼻能嗅所以能嗅者何物手能運用屈伸所以能運用屈伸者何物足能步趨所以能步趨者何物血氣能周流所以能周流者何物心能思慮所以能思慮者何物波羅提作用是性一偈即其義也其曰天地非大也毫髮非小也晝非明也夜非晦也往非古也此非今也它日非後也鳶飛戾天非鳶也魚躍於淵非魚也金剛經所謂如來説世界即非世界是名世界説三十二相即是非相是名三十二相即其義也凡篇中曰已曰吾曰我義與惟我獨尊無異其為襌學也固昭昭矣認紫為朱明是大錯乃敢放言無忌謂自生民以來未有能識吾之全者吾不知所謂吾者果何物邪夫堯舜禹湯文武周公孔子皆天下之大聖其遞相傳授無非精一執中之旨而所謂中者決非靈覺之謂非惟人人有之乃至事事有之物物有之慈湖顧獨未之識耳誠有以窺見其全已易其敢作乎閲斯集者但看得此篇破時譬之破竹餘皆迎刃而解矣吾聖賢之言與佛氏之言殊不相入謂儒佛無二道決非知道者也慈湖所引經傳如範圍天地發育萬物等語皆非聖賢本旨第假之以成就其説竊恐將來疑誤後學不淺故不得不明辨之程子嘗言聖人本天佛氏本心此乃灼然之見萬世不易之論儒佛異同實判於此是故天敘有典吾則從而惇之天秩有禮吾則從而庸之天命有德則從而章之天討有罪則從而刑之克綏厥猷本於上帝之降衷修道之教本於天命之在我所謂聖人本天者如此其深切著明也以慈湖之聰明宜若有見乎此何忍於叛堯舜湯孔而以心法起滅天地又任情牽合必欲混儒佛於一途邪蓋其言有云其心通者洞見天地人物皆在吾性量之中而天地萬物之變化皆吾性之變化又云意消則本清本明神用變化之妙固自若也無體無際範圍天地發育萬物之妙固自若也此等言語不謂之以心法起滅天地謂之何哉人之常情大抵恱新竒而慕髙逺故邪説得以乘間而入學者於此茍能虛心遜志無所偏主而執吾説以審其是非之歸將不為其所惑矣愚嘗謂人心之體即天之體本來一物但其主於我者謂之心非臆説也乃實見也若謂其心通者洞見天地人物皆在吾性量之中而此心可以範圍天地則是心大而天地小矣是以天地為有限量矣本欲其一反成二物謂之知道可乎易有太極是生兩儀乃統體之太極乾道變化各正性命則物物各具一太極矣其所以為太極則一而分則殊惟其分殊故其用亦别若謂天地人物之變化皆吾心之變化而以發育萬物歸之吾心是不知有分之殊矣既不知分之殊又惡可語夫理之一哉蓋發育萬物自是造化之功用人何與焉雖非人所能與其理即吾心之理故中庸贊大哉聖人之道而首以是為言明天人之無二也此豈蔽於異説者之所能識邪况天地之變化萬古自如人心之變化與生俱生則亦與生俱盡謂其常住不滅無是理也慈湖誤矣藐然數尺之軀乃欲私造化以為已物何其不知量哉文言曰夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時此言便是的確有心必有意心之官則思是皆出於天命之自然非人之所為也聖人所謂無意無私意耳所謂何思何慮以曉夫憧憧往來者耳書曰思曰睿睿作聖非思則作聖何由易曰聖人立象以盡意意若可無其又何盡之有故大學之教不曰無意惟曰誠意中庸之訓不曰無思惟曰慎思此吾儒入道之門積德之基窮理盡性必由於此斷斷乎其不可易者安得舉異端之邪説以亂之哉彼襌學者惟以頓悟為主必欲掃除意見屏絶思慮將四方八面路頭一齊塞住使其心更無一線可通牢關固閉以冀其一旦忽然而有省終其所見不過靈覺之光景而已性命之理實未嘗有見也安得舉此以亂吾儒窮理盡性之學哉學術不明為害非細言之不覺縷縷不識吾黨之士以為何如如欲學為佛邪慈湖之書宜不忍廢必欲學為聖人則固有五經四書及濓洛關閩之説在彼譸張為幻者又何足以溷吾之耳目哉心之精神是謂聖此言出於孔叢子初若可疑及考其全文首尾亦頗明白聖字自不須看得重而其意義亦非此句所能盡也慈湖獨摘此一句處處將來作弄豈有他哉蓋此句實與佛家即心是佛之言相似其悟處正在此故欣然取以為證使人無得而議焉更不暇顧其上下文義何如也請究言之子思問於孔子曰物有形類事有真偽必審之奚由子曰由乎心心之精神是謂聖推數究理不以物疑周其所察聖人病諸切詳問意蓋以物理事情皆所當審而欲知所以審之之由夫子遂以由乎心答之而申言心之妙用如此蓋聖者通明之謂人心之神無所不通謂之聖亦可也惟其無所不通故能推見事物之數究知事物之理物理既得夫復何疑若於形迹之粗必欲一一致察則雖聖人亦有未易能矣玩其辭詳其義可見能通之妙乃此心之神而所通之理是乃所謂道也若認精神以為道則錯矣易大傳曰一隂一陽之謂道又曰隂陽不測之謂神道為實體神為妙用雖非判然二物而實不容於相混聖人所以兩言之也道之在人則道心是也神之在人則人心是也若此處錯認焉往而不錯乎或疑所通之理為道則道乃在乎事物而不在吾心殊不知事物之理與吾心之理一而已矣不然何謂一以貫之何謂合內外之道因閲慈湖遺書有感偶賦小詩三章斜風細雨釀輕寒掩卷長吁百慮攢不是皇天分付定中華那復有衣冠裝成戲劇逐畨新任逼真時總不真何事貪看忘晝夜只緣聲色解迷人鏡中萬象原非實心上些兒却是真須就這些明一貫莫將形影弄精神書曰道心惟微程子曰心道之所在微道之體也解得極明些兒二字乃俗語邵康節詩中嘗用之意與微字相類天人物我所以通貫為一只是此理而已如一線之貫萬珠提起便都在掌握故盡已之性便能盡人物之性可以贊化育而參天地慈湖謂其心通者洞見天地人物皆在吾性量之中是將形影弄精神也殊不知鏡中之象與鏡原不相屬提不起按不下收不儱放不開安得謂之一貫邪慈湖所引論語知及之以合佛氏之所謂慧也仁能守之以合佛氏之所謂定也定慧不二謂之圓明慈湖蓋以此自處其門人頗有覺者則處之日月至焉之列乃慧而不足於定者也觀慈湖自處之意豈但與三月不違仁者比肩而已哉大哉一歌無狀尤甚凡為襌學者之不孫每每類此慈湖紀先訓內一條云近世有以小道與其門人講習學者宗仰語録流行人服其篤行遂信其説其説固多矣而害道者亦多遺患頗深其所指乃伊川程先生也何以知之蓋慈湖嘗與學者講聖人有所不知不能之説因議及伊川又回護數語云程之篤行亦豈易及不可不敬也但講學不得不辨明耳家庭議論如出一口決非偶然之故得無以其所覺者為極致遂敢於自大邪夫以大舜之聖為法於天下可傳於後世者無他惟是明於庶物察於人倫而已凡伊川與其門人之所講習無非人倫庶物之理千萬世之所通行者也安有千萬世之所通行者而可目之為小道哉若謂大道混成不容分析則伏羲既畫八卦又重為六十四卦文王繫卦周公繫爻孔子作十翼又出許多文字何其不憚煩也安知千條萬緒無非太極之實體茍能灼見其精微之妙雖毫分縷析自不害其為一伊川所作易傳蓋深得四聖之心者也顧可以小道目之邪必如其言則是大道不在伏羲舜文周公孔子而黃面瞿曇獨得之矣害斯道者非若人而誰千聖相傳只是一理堯舜禹湯所執之中孔子所不踰之矩顔子之所謂卓爾子思之所謂上下察孟子之所謂躍如皆是物也上聖大賢惟其見之真是以執之固而行之盡其次則博文約禮吾夫子有明訓矣蓋通天地人物其理本一而其分則殊必有以察乎其分之殊然後理之一者可見既有見矣必從而固守之然後應酬之際無或差謬此博約所以為吾儒之實學也襌家所見只是一片虛空曠蕩境界凡此理之在吾心與其在事物者竟不能識其至精至微之狀為何如而顧以理為障故朱子謂襌家最怕人説這理字誠切中其病矣慈湖訓語有云近世學者沉溺乎義理之意説胸中常存一理不能忘捨捨是則豁然無所憑依故必置理字於其中不知聖人胸中初無如許意度其怕這理字也不亦甚乎聖人胸中固自清明瑩徹然於中則曰允執於矩則曰不踰豈是漠然蕩無主宰而凡視聽言動喜怒哀樂一切任其自作自止真如水泡之自生自滅乎哉必不然矣且吾儒若除箇理字不講更講何事若見得此理真切自然通透灑落又何有於安排布置之勞為此言者適以自狀其不知理焉爾慈湖遺書不知何人所編初止十八卷有月録可考皆自諸稿中選出續集二卷又不知出自何人自十八卷觀之類皆出入經傳不雜以佛氏一語有以知編者之慮至深吾雖目為襌學人或未必盡悟及觀至續集則辭證具備亦其勢終有不可得而隱者如炳講師求訓奠馮氏妹詞二首己自分明招認尚何説哉程子嘗論及佛氏以謂昔之惑人也乘其迷暗今之入人也因其髙明若慈湖者天資亦不為不髙矣乃終身為禪學所誤今其書忽傳於世有識之士固能灼見其非亦何庸多辨惟是區區過慮自有所不能已爾易曰立人之道曰仁與義其名易知其理未易明也自道體言之渾然無間之謂仁截然有止之謂義自體道者言之心與理一之謂仁事與理一之謂義心與理一則該貫動靜斯渾然矣事與理一則動中有靜斯截然矣截然者不出乎渾然之中事之合理即心與理一之形也心與理初未嘗不一也有以間之則二矣然則何修何為而能復其本體之一邪曰敬虞書之所謂道心即樂記所謂人生而靜天之性也即中庸所謂未發之中天下之大本也決不可作已發看若認道心為已發則將何者以為大本乎愚於此所以不能無少異於朱子者前已有説平生所見此為至先比年反覆窮究益信此論之不容易也允執厥中之中先儒専以無過不及言似乎未盡竊詳其義當與中庸之中同體用兼舉而無遺斯為聖道之大全也仲虺之誥有云王懋昭大德建中於民以義制事以禮制心其言亦兼體用可見先聖後聖其揆一也舍已從人非見得道理透徹安能及此人所以固執己見善言更不能入者只是見不到復有一種性資輕快聞言便轉然未必皆當亦是無定見也夫所謂舍已從人者豈茍然哉從其至當而已矣舜命禹曰豫違汝弼汝無面從退有後言禹豈面從後言者邪益之告舜則以違道從欲為戒禹則以慢遊傲虐為戒臯陶則以叢脞為戒舜亦曷嘗有此數者之失邪蓋其君臣相與至誠懇切惟欲各盡其道而無毫髮之歉故常致謹於未然之防讀書者能識虞廷交相警戒之心斯可以事君矣善無常主協於克一時中之謂也秦誓一篇有可為後世法者二孔子所以列之四代之書之終悔過遷善知所以修身矣明於君子小人之情狀知所以用人矣慎斯道也以往帝王之治其殆庶幾乎鹿鳴之詩雖云上下通用要非賢人君子不足以當之今以鹿鳴名宴以賔禮初升之士待之不為不厚矣聽其歌飲其酒能無感動於其心乎然而周行之示能言者皆可勉也視民不恌則非聲音笑貌之所能為矣不如是將何以答主人之盛禮而稱其為嘉賔也邪樂記所舉欲與好惡大學所舉親愛賤惡畏敬哀矜中庸所舉喜怒哀樂孟子所舉惻隱羞惡辭讓是非等是人情但名言之不同耳凡情之發皆根於性其所以為善為惡係於有節與無節中節與不中節辟與不辟而已樂記大學中庸三説足以互相發明孟子道性善故所舉四端主意只在善之一邉其説終是不備但以大學證之亦可見矣哀矜猶惻隱也賤惡猶羞惡也畏敬猶恭敬也如發而皆當又何辟之可言哉此可見人心之危矣危字著在中間操持向上則極於中庸所謂天地位萬物育放縱趨下則如樂記所謂大亂之道固理勢之所必至也漢髙帝紀云母媪嘗息大澤之陂夢與神遇是時雷電晦冥父太公往視則見交龍於上夫人夢中所遇從未聞在他人有見之者史遷所記殊費分疏若太公所見者誠然則媪決非夢媪誠夢則太公之所見者妄矣漢武帝表章六經而黃老之説遂熄吾道有可行之兆矣然終帝之世未見其能有行豈其力之不足哉所不足者關雎麟趾之化爾善乎汲黯之言曰內多欲而外施仁義奈何欲致唐虞之治乎黯之學術不可知然觀乎此言非惟切中武帝之病且深達為治之本唐之禍亂本於李林甫宋之禍亂本於王介甫林甫之禍唐本於心術不端介甫之禍宋本於學術不正圖治當先定規模乃有持循積纍之地規模大則大成規模小則小成未有規模不定而能有成者也然其間病源所在不可不知秉德二三則規模不定用人二三則規模不定茍無其病於致治乎何有久任自是良法陸宣公明於治體乃不甚以為然蓋欲以救德宗之偏庶廣登延之路以濟一時之用且於惇大之化或有小補焉爾議法者未可執為定論正德間愚嘗建白此事而并及超遷之説大意以為超遷之法與久任之法相為流通超於前自可責其後之久超於後固無負其前之淹此蓋區區素見因他䇿忤用事者疏竟寢取士之法宜有變通士行修然後民德歸厚治安之本無切於此孟子之學亦自明而誠知言養氣是也自明而誠者未必便造其極理須善養盡心知性一章即是此義然其告公孫丑不曰善養吾性而曰氣者因告子勿求於氣而言以見其所以異也程子嘗言學者須先識仁一假説話皆與孟子相合但以存字該養字爾吾儒之學舍此更無是處然異學亦有假之以文其説者不可不明辨之凡聖賢言語須是看得浹洽義理方盡若執定一處將來硬説其他説不通處更不管只是成就得一箇偏見何由得到盡心地位邪近世學者因孟子有仁人心也一語便要硬説心即是仁獨不思以仁存心仁義禮智根於心其言亦出於孟子又將何説以通之邪孔子之稱顔淵亦曰其心三月不違仁仁之與心固當有辨須於此見得端的方可謂之識仁程子曰以吾觀於儒釋事事是句句合然而不同夫既曰事事是句句合矣何以又曰不同此正所謂毫釐之差也且如吾儒言心彼亦言心吾儒言性彼亦言性吾儒言寂感彼亦言寂感豈不是句句合然吾儒見得人心道心分明有别彼則混然無别矣安得同天地鬼神隂陽剛柔仁義雖每每並言其實天該乎地神該乎鬼陽該乎隂剛該乎柔仁該乎義明乎此説其於道也思過半矣義理愈窮究愈見細密到得愈細密處愈難為言一字未安或反纍其全體故有志於明道者其言自不容易若可增可減可移可換吾未敢以為知言也佛氏之學不知人物之所自來斷不足以經世儒而佛者自以為有得矣至於經理世務若非依傍吾聖人道理即一步不可行所得非所用所用非所得正所謂由其蔽於始是以缺於終爾內外本末既不免分為兩截猶譊譊然動以一貫藉口吾聖人所謂一以貫之者果如是乎顔淵曰舜何人也豫何人也有為者亦若是蓋以舜自期也舜飯糗茹草若將終身顔子簞食瓢飲不改其樂本原之地同一無纍如此則顔之進於舜也其孰能禦之孟子曰人能無以飢渴之害為心害則不及人不為憂矣此希聖希賢之第一義也困知記卷下
