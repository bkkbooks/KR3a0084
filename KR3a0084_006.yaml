body:
  text: 山林日長别無所事劄記之續時復有之然亦簡矣偶閲慈湖遺書不覺又有許多言語夫學之不講聖人以為憂余言雖多凡以講明此學非好辨也於初學之士或者未為無益乃删取近年所記而并刻之蓋其言間有互相發明者爾記凡再續故其卷亦分為上下云嘉靖癸巳夏五月戊申整庵識
